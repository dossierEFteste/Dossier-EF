  });
  const addAlunoBtn=document.getElementById('addAlunoBtn');
  if(addAlunoBtn) addAlunoBtn.addEventListener('click',()=>{
    const tbody=document.getElementById('alunosTbody');
    if(!tbody) return;
    const i=tbody.rows.length+1;
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td style="padding:3px"><input type="number" min="1" class="aluno-num" placeholder="${i}" style="width:44px;text-align:center;border:1px solid var(--border);border-radius:4px;padding:3px 4px;font-size:12px"></td>
      <td style="padding:3px"><input type="text" class="aluno-nome" placeholder="Nome completo" style="width:100%;border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:12px"></td>
      <td style="padding:3px"><input type="date" class="aluno-nasc" style="width:100%;border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:12px"></td>
      <td style="padding:3px"><select class="aluno-gen" style="width:100%;border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:12px"><option value="">—</option><option value="M">M</option><option value="F">F</option></select></td>
      <td style="padding:3px;text-align:center"><button class="btn btn-sm btn-danger remover-aluno" style="padding:2px 6px;font-size:11px">×</button></td>`;
    tbody.appendChild(tr);
    tr.querySelector('.remover-aluno').addEventListener('click',()=>tr.remove());
    const nomeInput=tr.querySelector('.aluno-nome');
    const genSelect=tr.querySelector('.aluno-gen');
    nomeInput.addEventListener('blur',()=>{
      if(!genSelect.value&&nomeInput.value.trim()){
        genSelect.value=detectarGenero(nomeInput.value.trim());
      }
    });
    nomeInput.focus();
  });
  document.querySelectorAll('.remover-aluno').forEach(btn=>{
    btn.addEventListener('click',()=>btn.closest('tr').remove());
  });

  // Reuniões
  const addReuniaoBtn=document.getElementById('addReuniaoBtn');
  if(addReuniaoBtn) addReuniaoBtn.addEventListener('click',()=>{modal={type:'addReuniao'};render();});

  // Tabs de categoria
  document.querySelectorAll('.reuniao-cat-tab').forEach(btn=>{
    btn.addEventListener('click',()=>{filterReuniaoCat=btn.dataset.cat;render();});
  });

  // Preview de anexos no modal (ao selecionar ficheiros)
  const rAnexosInput=document.getElementById('rAnexos');
  if(rAnexosInput){
    // Armazenar os ficheiros pendentes no modal
    if(!window._rAnexosPendentes) window._rAnexosPendentes=[];
    window._rAnexosPendentes=[];
    rAnexosInput.addEventListener('change',async()=>{
      const preview=document.getElementById('rAnexosPreview');
      for(const file of rAnexosInput.files){
        const dados=await lerFicheiroBase64(file);
        window._rAnexosPendentes.push({nome:file.name,tipo:file.type,dados});
        const el=document.createElement('div');
        const isImg=file.type.startsWith('image/');
        el.style.cssText='display:flex;align-items:center;gap:6px;background:var(--gray2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:11px;max-width:200px';
        el.innerHTML=isImg
          ?`<img src="${dados}" style="width:40px;height:40px;object-fit:cover;border-radius:4px"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(file.name)}</span>`
          :`<span style="font-size:16px">📄</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${esc(file.name)}</span>`;
        preview.appendChild(el);
      }
      rAnexosInput.value='';
    });
  }

  const saveReuniaoModal=document.getElementById('saveReuniaoModal');
  if(saveReuniaoModal) saveReuniaoModal.addEventListener('click',()=>{
    const categoriaEl=document.getElementById('rCategoria');
    const categoria=categoriaEl?categoriaEl.value:(filterReuniaoCat==='todas'?'reuniao':filterReuniaoCat);
    const data=document.getElementById('rData').value;
    const horaEl=document.getElementById('rHora');
    const hora=horaEl?horaEl.value:'';
    const subtipo=document.getElementById('rTipo').value;
    const localEl=document.getElementById('rLocal');
    const local=localEl?localEl.value.trim():'';
    const statusEl=document.getElementById('rStatus');
    const status=statusEl?statusEl.value:'';
    const notas=document.getElementById('rNotas').value.trim();
    const titulo=document.getElementById('rTitulo').value.trim();
    if(!data) return alert('Seleciona uma data.');
    if(!S.reunioes) S.reunioes=[];
    const anexos=window._rAnexosPendentes||[];
    S.reunioes.push({id:Date.now(),categoria,data,hora,subtipo,local,status:status||'Agendada',notas,titulo,anexos});
    window._rAnexosPendentes=[];
    save();modal=null;render();
  });

  document.querySelectorAll('.reuniao-notas').forEach(ta=>{
    ta.addEventListener('input',()=>{
      const rid=parseInt(ta.dataset.rid);
      const r=S.reunioes.find(x=>x.id===rid);
      if(r){r.notas=ta.value;save();}
    });
  });

  document.querySelectorAll('.reuniao-status-sel').forEach(sel=>{
    sel.addEventListener('change',()=>{
      const rid=parseInt(sel.dataset.rid);
      const r=S.reunioes.find(x=>x.id===rid);
      if(r){r.status=sel.value;save();render();}
    });
  });

  // Anexar ficheiros a um registo já existente
  document.querySelectorAll('.reuniao-anexo-input').forEach(input=>{
    input.addEventListener('change',async()=>{
      const rid=parseInt(input.dataset.rid);
      const r=S.reunioes.find(x=>x.id===rid);
      if(!r) return;
      if(!r.anexos) r.anexos=[];
      for(const file of input.files){
        const dados=await lerFicheiroBase64(file);
        r.anexos.push({nome:file.name,tipo:file.type,dados});
      }
      input.value='';
      save();render();
    });
  });

  // Apagar anexo individual
  document.querySelectorAll('.anexo-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const rid=parseInt(btn.dataset.rid);
      const ai=parseInt(btn.dataset.ai);
      const r=S.reunioes.find(x=>x.id===rid);
      if(r&&r.anexos){
        r.anexos.splice(ai,1);
        save();render();
      }
    });
  });

  // Lightbox para imagens
  document.querySelectorAll('.anexo-img-preview').forEach(img=>{
    img.addEventListener('click',()=>{
      const overlay=document.createElement('div');
      overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
      const imgEl=document.createElement('img');
      imgEl.src=img.src;
      imgEl.style.cssText='max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,0.5)';
      overlay.appendChild(imgEl);
      overlay.addEventListener('click',()=>overlay.remove());
      document.body.appendChild(overlay);
    });
  });

  document.querySelectorAll('.reuniao-del').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const rid=parseInt(btn.dataset.rid);
      if(confirm('Apagar este registo?')){
        S.reunioes=S.reunioes.filter(x=>x.id!==rid);
        save();render();
      }
    });
  });
  // Grelha de Observação por Modalidade
  if(modal&&modal.type==='grelhaObs'){
    function focusGrelhaCell(row,ci){
      if(!row) return;
      const el=row.querySelector(`.grelha-obs-crit[data-ci="${ci}"]`);
      if(el){ el.focus(); el.select(); }
    }
    document.querySelectorAll('.grelha-obs-criterio-titulo').forEach(el=>{
      el.addEventListener('change',()=>{
        const ci=parseInt(el.dataset.ci);
        const novoTitulo=el.value.trim();
        if(!novoTitulo){
          // não permite ficar vazio: repõe o valor anterior
          const turma=S.turmas.find(t=>t.id==modal.turmaId);
          const ativTitulosModal=getAtividadesTitulos(modal.turmaId, modal.sub);
          const tituloMod=ativTitulosModal[modal.col]||`Matéria ${modal.col+1}`;
          const criteriosAtuais=getCriteriosGrelha(modal.turmaId, modal.sub, modal.col, tituloMod);
          el.value=criteriosAtuais[ci];
          return;
        }
        const sourceKey=(modal.sub==='sem2')?`${modal.turmaId}__sem1`:`${modal.turmaId}__${modal.sub}`;
        if(!S.avaliacao[sourceKey]) S.avaliacao[sourceKey]={notas:{},obsAlunos:{},ativNotas:{},obs:''};
        const src=S.avaliacao[sourceKey];
        if(!src.grelhaObsCriterios) src.grelhaObsCriterios={};
        const turma=S.turmas.find(t=>t.id==modal.turmaId);
        const ativTitulosModal=getAtividadesTitulos(modal.turmaId, modal.sub);
        const tituloMod=ativTitulosModal[modal.col]||`Matéria ${modal.col+1}`;
        const base=getCriteriosGrelha(modal.turmaId, modal.sub, modal.col, tituloMod);
        const novosCriterios=base.slice();
        novosCriterios[ci]=novoTitulo;
        src.grelhaObsCriterios[modal.col]=novosCriterios;
        save();render();
      });
    });
    document.querySelectorAll('.grelha-obs-crit').forEach(el=>{
      el.addEventListener('input',()=>{
        let v=parseFloat(el.value);
        if(!isNaN(v)){
          v=Math.round(v);
          if(v>3) v=3;
          if(v<1) v=1;
          el.value=v;
        }
        const nome=el.dataset.nome, ci=parseInt(el.dataset.ci);
        const key=`${modal.turmaId}__${modal.sub}`;
        if(!S.avaliacao[key]) S.avaliacao[key]={notas:{},obsAlunos:{},ativNotas:{},obs:''};
        if(!S.avaliacao[key].grelhaObs) S.avaliacao[key].grelhaObs={};
        if(!S.avaliacao[key].grelhaObs[modal.col]) S.avaliacao[key].grelhaObs[modal.col]={};
        if(!S.avaliacao[key].grelhaObs[modal.col][nome]) S.avaliacao[key].grelhaObs[modal.col][nome]=['','','',''];
        S.avaliacao[key].grelhaObs[modal.col][nome][ci]=el.value===''?'':parseFloat(el.value);
        const vals=S.avaliacao[key].grelhaObs[modal.col][nome];
        const filled=vals.filter(x=>x!==''&&x!==null&&x!==undefined);
        const soma=vals.reduce((s,x)=>s+(parseFloat(x)||0),0);
        const nivelCell=el.closest('tr')?.querySelector('.grelha-obs-nivel');
        if(nivelCell) nivelCell.textContent=filled.length?calcNivelGrelha(soma).label:'—';
        save();
      });
      el.addEventListener('keydown',(e)=>{
        const row=el.closest('tr');
        const ci=parseInt(el.dataset.ci);
        if(e.key==='Enter'||e.key==='ArrowDown'){
          e.preventDefault();
          focusGrelhaCell(row?.nextElementSibling,ci);
        } else if(e.key==='ArrowUp'){
          e.preventDefault();
          focusGrelhaCell(row?.previousElementSibling,ci);
        } else if(e.key==='ArrowRight'){
          e.preventDefault();
          focusGrelhaCell(row,ci+1);
        } else if(e.key==='ArrowLeft'){
          e.preventDefault();
          focusGrelhaCell(row,ci-1);
        }
      });
    });
    // Grelha de Observação — Atletismo (Resultado/Avaliação x3 + Escalão + Data por tentativa)
    document.querySelectorAll('.grelha-atlet-data-rep').forEach(el=>{
      el.addEventListener('change',()=>{
        const di=parseInt(el.dataset.idx);
        const key=`${modal.turmaId}__${modal.sub}`;
        if(!S.avaliacao[key]) S.avaliacao[key]={notas:{},obsAlunos:{},ativNotas:{},obs:''};
        if(!S.avaliacao[key].grelhaObsAtletismo) S.avaliacao[key].grelhaObsAtletismo={};
        if(!S.avaliacao[key].grelhaObsAtletismo[modal.col]) S.avaliacao[key].grelhaObsAtletismo[modal.col]={datas:Array(PROVAS_ATLETISMO.length*REPS_ATLETISMO).fill(''),alunos:{}};
        const bloco=S.avaliacao[key].grelhaObsAtletismo[modal.col];
        if(!bloco.datas) bloco.datas=Array(PROVAS_ATLETISMO.length*REPS_ATLETISMO).fill('');
        bloco.datas[di]=el.value;
        save();
      });
    });
    // Recalcula e escreve a Avaliação (I/S/B/MB) de uma célula de Resultado, na linha (tr) correspondente
    function atualizarAvaliacaoCelula(inputResultado){
      const row=inputResultado.closest('tr');
      if(!row) return;
      const idxAval=parseInt(inputResultado.dataset.idxAval);
      const prova=inputResultado.dataset.prova;
      const genero=inputResultado.dataset.genero;
      const escalaoEl=row.querySelector('.grelha-atlet-escalao');
      const escalao=escalaoEl?escalaoEl.value:'';
      const nivel=calcAvaliacaoAtletismo(prova, genero, escalao, inputResultado.value);
      const avalEl=row.querySelector(`.grelha-atlet-avaliacao[data-idx="${idxAval}"]`);
      if(avalEl) avalEl.value=nivel;
      return {idxAval, nivel};
    }
    function guardarValorAtletismo(nome, idx, valor){
      const key=`${modal.turmaId}__${modal.sub}`;
      if(!S.avaliacao[key]) S.avaliacao[key]={notas:{},obsAlunos:{},ativNotas:{},obs:''};
      if(!S.avaliacao[key].grelhaObsAtletismo) S.avaliacao[key].grelhaObsAtletismo={};
      if(!S.avaliacao[key].grelhaObsAtletismo[modal.col]) S.avaliacao[key].grelhaObsAtletismo[modal.col]={datas:Array(PROVAS_ATLETISMO.length*REPS_ATLETISMO).fill(''),alunos:{}};
      const bloco=S.avaliacao[key].grelhaObsAtletismo[modal.col];
      if(!bloco.alunos[nome]) bloco.alunos[nome]={escalao:'',valores:Array(PROVAS_ATLETISMO.length*REPS_ATLETISMO*2).fill('')};
      if(!bloco.alunos[nome].valores) bloco.alunos[nome].valores=Array(PROVAS_ATLETISMO.length*REPS_ATLETISMO*2).fill('');
      bloco.alunos[nome].valores[idx]=valor;
    }
    document.querySelectorAll('.grelha-atlet-escalao').forEach(el=>{
      el.addEventListener('input',()=>{
        const nome=el.dataset.nome;
        const key=`${modal.turmaId}__${modal.sub}`;
        if(!S.avaliacao[key]) S.avaliacao[key]={notas:{},obsAlunos:{},ativNotas:{},obs:''};
        if(!S.avaliacao[key].grelhaObsAtletismo) S.avaliacao[key].grelhaObsAtletismo={};
        if(!S.avaliacao[key].grelhaObsAtletismo[modal.col]) S.avaliacao[key].grelhaObsAtletismo[modal.col]={datas:Array(PROVAS_ATLETISMO.length*REPS_ATLETISMO).fill(''),alunos:{}};
        const bloco=S.avaliacao[key].grelhaObsAtletismo[modal.col];
        if(!bloco.alunos[nome]) bloco.alunos[nome]={escalao:'',valores:Array(PROVAS_ATLETISMO.length*REPS_ATLETISMO*2).fill('')};
        bloco.alunos[nome].escalao=el.value;
        // Recalcular todas as avaliações desta linha com o novo escalão
        const row=el.closest('tr');
        if(row){
          row.querySelectorAll('.grelha-atlet-resultado').forEach(inputResultado=>{
            if(inputResultado.value.trim()===''){
              const idxAval=parseInt(inputResultado.dataset.idxAval);
              const avalEl=row.querySelector(`.grelha-atlet-avaliacao[data-idx="${idxAval}"]`);
              if(avalEl) avalEl.value='';
              guardarValorAtletismo(nome, idxAval, '');
              return;
            }
            const {idxAval,nivel}=atualizarAvaliacaoCelula(inputResultado);
            guardarValorAtletismo(nome, idxAval, nivel);
          });
        }
        save();
      });
    });
    function focusGrelhaAtletCell(row,idx){
      if(!row) return;
      const el=row.querySelector(`.grelha-atlet-resultado[data-idx="${idx}"]`);
      if(el){ el.focus(); el.select(); }
    }
    document.querySelectorAll('.grelha-atlet-resultado').forEach(el=>{
      el.addEventListener('input',()=>{
        const nome=el.dataset.nome, idx=parseInt(el.dataset.idx);
        guardarValorAtletismo(nome, idx, el.value);
        const {idxAval,nivel}=atualizarAvaliacaoCelula(el);
        guardarValorAtletismo(nome, idxAval, nivel);
        save();
      });
      el.addEventListener('keydown',(e)=>{
        const row=el.closest('tr');
        const idx=parseInt(el.dataset.idx);
        if(e.key==='Enter'||e.key==='ArrowDown'){
          e.preventDefault();
          focusGrelhaAtletCell(row?.nextElementSibling,idx);
        } else if(e.key==='ArrowUp'){
          e.preventDefault();
          focusGrelhaAtletCell(row?.previousElementSibling,idx);
        }
      });
    });
  }
  // Mapas de Rotação
  if(currentTab==='rotacao') attachRotacaoEvents();
}

function lerFicheiroBase64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('Erro ao ler ficheiro'));
    r.readAsDataURL(file);
  });
}

    'Agendada':'background:#dbeafe;color:#1e3a8a;border-color:#93c5fd',

  const tabs=tabTodas+REUNIAO_CATEGORIAS.map(c=>{
    const active=filterReuniaoCat===c.id;
    return `<button class="reuniao-cat-tab" data-cat="${c.id}" style="display:flex;align-items:center;gap:6px;padding:9px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid ${active?'var(--blue)':'var(--border)'};background:${active?'var(--blue)':'#fff'};color:${active?'#fff':'var(--navy)'};transition:all 0.15s">${c.icon} ${c.label}</button>`;
  }).join('');

  const cat=REUNIAO_CATEGORIAS.find(c=>c.id===filterReuniaoCat);
  const lista=(filterReuniaoCat==='todas'
    ? S.reunioes.slice()
    : S.reunioes.filter(r=>r.categoria===filterReuniaoCat)
  ).sort((a,b)=>a.data.localeCompare(b.data));

  const renderRow=(r)=>{
    const catInfo=REUNIAO_CATEGORIAS.find(c=>c.id===r.categoria)||REUNIAO_CATEGORIAS[0];
    const isSimples=r.categoria==='nota'||r.categoria==='outro';
    const sc=statusCores[r.status]||statusCores['Agendada'];
    const notasPlaceholder=r.categoria==='reuniao'
      ?'Ordem de trabalhos, decisões, participantes…'
      :r.categoria==='evento'
      ?'Descrição, participantes, observações…'
      :'Escreve aqui…';
    const anexos=(r.anexos||[]);
    const anexosHtml=anexos.length?`<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:10px">${anexos.map((a,ai)=>{

// === STICKY THEAD: recalcula top dinamicamente com base nas alturas reais das linhas ===

function fixAidStickyMobile(){
  if(!isMobile()) return;
  // Só actua nas tabelas AID/sem1/sem2 (não Fitescola que já tem sticky próprio)
  if(filterAvaliacaoSub==='fitescola'||filterAvaliacaoSub==='fitescola1s'||filterAvaliacaoSub==='fitescola2s') return;
  const wrapper=document.getElementById('aval-table-wrapper');
  if(!wrapper) return;
  // Garantir overflow correcto no wrapper
  wrapper.style.overflowX='auto';
  wrapper.style.webkitOverflowScrolling='touch';
  // Aplicar sticky às primeiras 2 células de cada linha (# e Nome)
  const table=wrapper.querySelector('table');
  if(!table) return;
  table.querySelectorAll('tr').forEach(tr=>{
    const cells=[...tr.querySelectorAll('th, td')];
    if(cells.length<2) return;
    // Coluna # (índice 0)
    cells[0].style.position='sticky';
    cells[0].style.left='0px';
    cells[0].style.zIndex= tr.closest('thead') ? '10' : '2';
    if(!cells[0].style.background) cells[0].style.background='inherit';
    // Coluna Nome (índice 1)
    cells[1].style.position='sticky';
    cells[1].style.left='32px';
    cells[1].style.zIndex= tr.closest('thead') ? '10' : '2';
    cells[1].style.boxShadow='3px 0 5px -1px rgba(0,0,0,0.15)';
    if(!cells[1].style.background) cells[1].style.background='inherit';
  });
}

function fixStickyThead(){
  const wrapper=document.getElementById('aval-table-wrapper');
  if(!wrapper) return;
  const table=wrapper.querySelector('table');
  if(!table) return;
  const thead=table.querySelector('thead');
  if(!thead) return;
  const rows=[...thead.querySelectorAll('tr')];
  if(rows.length<2) return;
  // Calcular cumulative top para cada linha
  let cumTop=0;
  rows.forEach(row=>{
    // Aplicar top acumulado a todos os th desta linha
    row.querySelectorAll('th').forEach(th=>{
      th.style.top=cumTop+'px';
      th.style.position='sticky';
      th.style.zIndex=th.style.zIndex||'4';
    });
    cumTop+=row.getBoundingClientRect().height;
  });
  // Garantir que colunas com left (sticky horizontal) ficam sempre acima das outras
  thead.querySelectorAll('th[style*="left"]').forEach(th=>{
    th.style.zIndex='10';
  });
  // Também garantir que a altura máxima do wrapper é correta
  const topOfWrapper=wrapper.getBoundingClientRect().top;
  const viewportH=window.innerHeight;
  const available=viewportH-topOfWrapper-16; // 16px de margem em baixo
  wrapper.style.maxHeight=Math.max(200,available)+'px';
}

async function fetchWeatherWeek(weekDates){
  const key = weekDates[0];
  if(weatherFetchedWeek === key && Object.keys(weatherCache).length > 0) return; // já buscado com sucesso
  weatherFetchedWeek = key;
  try {
    const start = weekDates[0];
    const end   = weekDates[weekDates.length-1];
    const url = `https://api.open-meteo.com/v1/forecast?latitude=38.5244&longitude=-8.8882&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FLisbon&start_date=${start}&end_date=${end}`;
    const res = await fetch(url);
    const data = await res.json();
    const days = data.daily;
    days.time.forEach((dt, i) => {
      const code = days.weathercode[i];
      weatherCache[dt] = {
        icon:    WMO_ICONS[code] ?? '🌡️',
        desc:    WMO_DESC[code]  ?? '',
        tempMax: Math.round(days.temperature_2m_max[i]),
        tempMin: Math.round(days.temperature_2m_min[i])
      };
    });
    // Re-renderiza sempre que haja dados novos
    render();
  } catch(e){
    weatherFetchedWeek = null; // permite retry
    console.warn('Meteorologia indisponível:', e);
  }
}

// Calcula qual a semana actual (2ª a 6ª) para comparação
function getCurrentWeekDates(){
  const today = new Date();
  const day = today.getDay(); // 0=Dom
  const monday = new Date(today);
  monday.setDate(today.getDate() + (day===0 ? -6 : 1-day));
  const dates = [];
  for(let i=0;i<5;i++){
    const d = new Date(monday);
    d.setDate(monday.getDate()+i);
    dates.push(d.toISOString().slice(0,10));
  }
  return dates;
}

  return 'rotacao_map_' + a.replace('/', '_');
}
function rotLsProfKey(ano) {
  const a = ano || (S && S.anoLetivo ? S.anoLetivo : '');
  return 'rotacao_profs_' + a.replace('/', '_');
}
function rotResetState() {
  rotProfessors = [];
  rotSLOTS = [
    ['08:20','09:10'],['09:20','10:10'],['10:30','11:20'],['11:30','12:20'],['12:30','13:20'],
    null,
    ['13:30','14:20'],['14:30','15:20'],['15:30','16:20'],['16:40','17:30'],['17:40','18:30'],
    null,
    ['18:30','20:10']
  ];
  rotMap1 = Array.from({length: ROT_DAYS.length}, () =>
    Array.from({length: rotSLOTS.length}, () => Array(4).fill(''))
  );
  rotLocked = Array.from({length: ROT_DAYS.length}, () =>
    Array.from({length: rotSLOTS.length}, () => Array(4).fill(false))
  );
}
function rotSaveMap() {
  try { localStorage.setItem(rotLsKey(), JSON.stringify({ map1: rotMap1, locked: rotLocked, SLOTS: rotSLOTS })); } catch(e) {}
}
function rotSaveProfs() {
  try { localStorage.setItem(rotLsProfKey(), JSON.stringify(rotProfessors)); } catch(e) {}
}
function rotLoadMap() {
  try {
    const raw = localStorage.getItem(rotLsKey());
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s.map1)   rotMap1   = s.map1;
    if (s.locked) rotLocked = s.locked;
    if (s.SLOTS)  rotSLOTS  = s.SLOTS;
  } catch(e) {}
}
function rotLoadProfs() {
  try {
    const raw = localStorage.getItem(rotLsProfKey());
    if (raw) rotProfessors = JSON.parse(raw);
  } catch(e) {}
}
rotLoadMap();
rotLoadProfs();

// ── Lógica de rotação ──────────────────────────────────────────
function rotRotate(row, lockRow, map1Row) {
  const result = ['','','',''];
  lockRow.forEach((isLocked, ci) => { if(isLocked) result[ci] = map1Row[ci]; });
  const freeSlots = [0,1,2,3].filter(ci => !lockRow[ci]);
  const rotatedFreeValues = freeSlots.map(ci => lockRow[(ci+3)%4] ? '' : row[(ci+3)%4]);
  freeSlots.forEach((ci, i) => { result[ci] = rotatedFreeValues[i]; });
  return result;
}
function rotGetMapData(mapIdx) {
  if(mapIdx === 0) return rotMap1;
  const prev = rotGetMapData(mapIdx - 1);
  return prev.map((dayRows, di) =>
    dayRows.map((row, si) => {
      if(!rotSLOTS[si]) return row;
      return rotRotate(row, rotLocked[di][si], rotMap1[di][si]);
    })
  );
}

// ── Cor de professor ───────────────────────────────────────────
function rotContrastText(hex) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000 > 150 ? '#1a2332' : '#ffffff';
}
function rotGetProfColor(val) {
  if(!val) return null;
  const v = val.trim().toLowerCase();
  for(const p of rotProfessors) {
    if(!p.turmas) continue;
    const turmas = p.turmas.split(/[,;\s]+/).map(t=>t.trim().toLowerCase()).filter(Boolean);
    if(turmas.some(t => t && v.includes(t))) return {color: p.color, textColor: p.textColor};
  }
  return null;
}

    } else {

    }
  }

  // Mobile: 2 linhas — linha 1: Professores + Semana Atual; linha 2: Mapa 1‑4
  const profBtn   = subPastas.find(s => s.view === 'servico');
  const mapBtns   = subPastas.filter(s => s.view === 'map');

  const btnHtml = mob
    ? `<div style="display:flex;flex-direction:column;gap:6px;width:100%">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          ${rotBtn(profBtn)}
          <div style="display:flex;flex-direction:column;justify-content:center;align-items:flex-start;gap:2px;padding:8px 10px;border-radius:8px;background:var(--navy);color:#fff;min-height:52px;box-sizing:border-box">
            <span style="font-size:9px;font-weight:600;opacity:0.65;letter-spacing:0.04em;text-transform:uppercase">Semana atual</span>
            <span style="font-size:14px;font-weight:800;line-height:1.1">Semana ${semanaAtual} · Mapa ${mapaAtual}</span>
            ${semDatas ? `<span style="font-size:9px;opacity:0.7">${semDatas}</span>` : ''}
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
          ${mapBtns.map(s => rotBtn(s)).join('')}
        </div>
      </div>`
    : subPastas.map(s => rotBtn(s)).join('');

  let contentHtml = '';

    contentHtml = rotRenderServicoHtml();

    contentHtml = rotRenderMapHtml(rotCurrentMap);

  return `<div>
    <div style="position:sticky;top:0;z-index:50;background:#f0f2f5;padding-bottom:10px;margin-bottom:0;overflow:visible">
      <div class="filter-bar" style="padding-top:4px">
        <div class="section-title" style="margin:0">Mapas de Rotação</div>
        <div style="margin-left:auto;display:${mob?'none':'flex'};align-items:center;gap:6px;flex-wrap:wrap">
          <button class="btn btn-sm" id="rotExportJsonBtn" style="display:flex;align-items:center;gap:5px;background:#dcfce7;color:#15803d;border-color:#86efac">📤 Exportar JSON</button>
          <label class="btn btn-sm" style="display:flex;align-items:center;gap:5px;background:#dbeafe;color:#1e40af;border-color:#93c5fd;cursor:pointer;margin:0">📥 Importar JSON<input type="file" id="rotImportJsonInput" accept=".json" style="display:none"></label>
          <button class="btn btn-primary btn-sm" id="rotExportPdfBtn" style="display:flex;align-items:center;gap:6px">⬇ Exportar PDF</button>

      <div style="display:flex;align-items:stretch;gap:8px;flex-wrap:wrap;padding-bottom:10px;border-bottom:1px solid var(--border);overflow:visible">${btnHtml}${mob ? '' : semanaTag}</div>

}

function rotRenderMapHtml(mapIdx) {
  const data     = rotGetMapData(mapIdx);
  const editable = mapIdx === 0;
  const mob      = isMobile();
  const noteHtml = editable
    ? `<p style="font-size:${mob?'10px':'12px'};color:var(--blue2);margin-bottom:${mob?'6px':'12px'}">✏️ Edita diretamente as células abaixo. Duplo clique para fixar/libertar a rotação.</p>`
    : `<p style="font-size:${mob?'10px':'12px'};color:var(--gray);margin-bottom:${mob?'6px':'12px'}">🔒 Gerado automaticamente por rotação do Mapa ${mapIdx}.</p>`;

  let html = noteHtml;
  // Colunas: 2 hora + 5 dias × 4 espaços + 4 separadores finos = 30 cols
  // Usar table-layout:fixed + width:100% para caber no ecrã sem scroll
  const fs   = mob ? '8px'  : '10px';  // font-size nas células
  const fsH  = mob ? '7px'  : '10px';  // cabeçalhos dos dias
  const fsS  = mob ? '6px'  : '9px';   // cabeçalhos G1/E1/G2/E2
  const fsT  = mob ? '6px'  : '9px';   // horas
  const pad  = mob ? '0'    : '3px 2px';
  const padT = mob ? '1px 0': '3px 2px';

  // Em mobile: quebra o valor em 2 linhas centradas
  function rotFmt(v) {
    if (!mob || !v) return esc(v);
    // Padrao NnX: separar ano escolar da letra de turma (ex: 9oG, 10A)
    const m = v.match(/^(\d+[º°o]?)([A-Za-z].*)$/);
    if (m && m[1] && m[2])
      return '<span style="display:block;text-align:center;line-height:1.3">' + esc(m[1]) + '</span>'
           + '<span style="display:block;text-align:center;line-height:1.3">' + esc(m[2]) + '</span>';
    // Separar no ultimo espaco
    const sp = v.lastIndexOf(' ');
    if (sp > 0 && sp < v.length - 1)
      return '<span style="display:block;text-align:center;line-height:1.3">' + esc(v.slice(0,sp)) + '</span>'
           + '<span style="display:block;text-align:center;line-height:1.3">' + esc(v.slice(sp+1)) + '</span>';
    // Cortar a meio se longo
    if (v.length > 3) {
      const mid = Math.ceil(v.length / 2);
      return '<span style="display:block;text-align:center;line-height:1.3">' + esc(v.slice(0,mid)) + '</span>'
           + '<span style="display:block;text-align:center;line-height:1.3">' + esc(v.slice(mid)) + '</span>';
    }
    return esc(v);
  }

  html += `<table class="schedule-table" style="width:100%;table-layout:fixed;font-size:${fs}">`;
  // Definir larguras relativas via colgroup
  html += '<colgroup>';
  html += `<col style="width:${mob?'5.5%':'5%'}"><col style="width:${mob?'5.5%':'5%'}">`;
  for(let di = 0; di < ROT_DAYS.length; di++) {
    if(di > 0) html += `<col style="width:${mob?'2px':'4px'}">`;
    html += `<col style="width:${mob?'4%':'4.2%'}"><col style="width:${mob?'4%':'4.2%'}"><col style="width:${mob?'4%':'4.2%'}"><col style="width:${mob?'4%':'4.2%'}">`;
  }
  html += '</colgroup>';
  html += '<thead><tr><th colspan="2">Hora</th>';
  ROT_DAYS.forEach((d, di) => {
    if(di > 0) html += `<th style="width:${mob?'2px':'4px'};padding:0;background:var(--gray2);border:none"></th>`;
    html += `<th colspan="4" style="font-size:${fsH};padding:${pad}">${mob ? d.replace('Feira','F.') : d}</th>`;
  });
  html += '</tr><tr><th></th><th></th>';
  ROT_DAYS.forEach((d, di) => {
    if(di > 0) html += `<th style="width:${mob?'2px':'4px'};padding:0;background:var(--gray2);border:none"></th>`;
    ROT_COLS.forEach((col, ci) =>
      html += `<th style="color:${ROT_COL_COLORS[ci]};font-size:${fsS};padding:${pad}">${col}</th>`
    );
  });
  html += '</tr></thead><tbody>';

  rotSLOTS.forEach((slot, si) => {
    const totalCols = 2 + ROT_DAYS.length * 4 + (ROT_DAYS.length - 1);
    if(!slot) {
      html += `<tr><td colspan="${totalCols}" style="height:${mob?'2px':'5px'};background:var(--gray2);padding:0;border:none"></td></tr>`;
      return;
    }
    const [s, e] = slot;
    const timeStyle = `font-size:${fsT};padding:${padT};white-space:nowrap;overflow:hidden;text-overflow:ellipsis`;
    if(editable) {
      html += `<tr>
        <td class="time-col" style="${timeStyle}"><input class="rot-time-input" data-si="${si}" data-t="0" value="${s}" style="width:100%;border:none;border-radius:2px;padding:0;font-size:${fsT};text-align:center;background:transparent;color:var(--gray);font-family:inherit"></td>
        <td class="time-col" style="${timeStyle}"><input class="rot-time-input" data-si="${si}" data-t="1" value="${e}" style="width:100%;border:none;border-radius:2px;padding:0;font-size:${fsT};text-align:center;background:transparent;color:var(--gray);font-family:inherit"></td>`;
    } else {
      html += `<tr><td class="time-col" style="${timeStyle}">${s}</td><td class="time-col" style="${timeStyle}">${e}</td>`;
    }
    ROT_DAYS.forEach((d, di) => {
      if(di > 0) html += `<td style="width:${mob?'2px':'4px'};padding:0;background:var(--gray2);border-top:1px solid var(--border);border-bottom:1px solid var(--border)"></td>`;
      ROT_COLS.forEach((col, ci) => {
        const val      = data[di][si][ci] || '';
        const isLocked = rotLocked[di][si][ci];
        const pc       = rotGetProfColor(val);
        const bg       = isLocked ? '#fef3c7' : (pc ? pc.color : '');
        const tc       = isLocked ? '#92400e' : (pc ? pc.textColor : '');
        const cellBg   = bg ? `background:${bg};` : '';
        const cellStyle = `${cellBg}padding:0;overflow:hidden;`;
        if(editable) {
          const inpBg = isLocked ? 'background:#fef3c7;color:#92400e;' : (bg ? `background:${bg};color:${tc};` : '');
          const title = isLocked ? 'Rotação cancelada — duplo clique para reativar' : 'Duplo clique para cancelar rotação';
          if (mob) {
            html += `<td style="${cellStyle}position:relative;vertical-align:middle;">`
              + `<div style="font-size:${fs};color:${tc||'var(--navy)'};line-height:1.2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1px 0;pointer-events:none;${inpBg}">${val ? rotFmt(val) : '<span style=\'color:var(--border)\'>-</span>'}</div>`
              + `<input class="rot-cell" data-d="${di}" data-s="${si}" data-c="${ci}" value="${esc(val)}" placeholder="-" title="${title}" style="position:absolute;inset:0;width:100%;height:100%;border:none;padding:0;font-size:${fs};text-align:center;background:transparent;color:transparent;caret-color:var(--navy);font-family:inherit;cursor:pointer;z-index:2;${inpBg}">`
              + `</td>`;
          } else {
            html += `<td style="${cellStyle}">
              <input class="rot-cell" data-d="${di}" data-s="${si}" data-c="${ci}" value="${esc(val)}" placeholder="—" title="${title}" style="width:100%;border:none;border-radius:0;padding:1px 0;font-size:${fs};text-align:center;background:transparent;color:var(--navy);font-family:inherit;cursor:pointer;${inpBg}">
            </td>`;
          }
        } else {
          html += val
            ? `<td style="${cellStyle}text-align:center;vertical-align:middle;"><div style="font-size:${fs};color:${tc||'var(--navy)'};line-height:1.2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1px 0">${mob ? rotFmt(val) : esc(val)}</div></td>`
            : `<td style="text-align:center;padding:0;color:var(--border);font-size:${fsS}">&#8212;</td>`;
        }
      });
    });
    html += '</tr>';
  });
  html += '</tbody></table>';

  // Legenda de colunas
  html += `<div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--gray);align-items:center">
    <span style="font-weight:600;color:var(--navy)">Espaços:</span>
    ${ROT_COLS.map((c,i)=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:${ROT_COL_COLORS[i]};display:inline-block"></span>${c}</span>`).join('')}
    <span style="display:flex;align-items:center;gap:5px;margin-left:8px"><span style="width:14px;height:14px;border-radius:3px;background:#fef3c7;border:1.5px solid #fcd34d;display:inline-block"></span>Rotação fixada</span>
  </div>`;

  // Legenda de professores
  if(rotProfessors.length) {
    const chips = rotProfessors.map(p => {
      const turmaList = p.turmas
        ? p.turmas.split(/[,;]+/).map(t=>t.trim()).filter(Boolean)
            .map(t=>`<span class="badge" style="background:rgba(0,0,0,.12);color:inherit;font-size:9px;padding:1px 4px">${t}</span>`).join('')
        : '';
      return `<div style="display:flex;flex-direction:column;gap:3px;padding:5px 8px;border-radius:7px;font-size:11px;font-weight:500;border:1px solid rgba(0,0,0,.12);background:${p.color};color:${p.textColor}">
        <span style="font-size:12px;font-weight:700">${esc(p.name)}</span>
        <div style="display:flex;gap:2px;flex-wrap:wrap">${turmaList}</div>
      </div>`;
    }).join('');
    html += `<div style="margin-top:14px;padding:12px;background:var(--gray2);border-radius:8px;border:1px solid var(--border)">
      <div style="font-size:11px;font-weight:600;color:var(--gray);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Professores</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div>
    </div>`;
  }
  return html;
}

// ── Modal de professor ─────────────────────────────────────────

  const isEdit = rotModalIdx >= 0;
  const p = isEdit ? rotProfessors[rotModalIdx] : null;
  rotModalColor = isEdit ? p.color : ROT_PRESETS[rotProfessors.length % ROT_PRESETS.length];

  const presetDots = (colors) => colors.map(c =>
    `<span style="display:inline-block;width:22px;height:22px;border-radius:5px;background:${c};cursor:pointer;border:2px solid ${c===rotModalColor?'var(--navy)':'transparent'};transition:all .1s;vertical-align:middle;margin:2px" data-rotpreset="${c}" title="${c}"></span>`
  ).join('');

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.id = 'rot-modal-overlay';
  overlay.innerHTML = `<div class="modal">
    <div class="modal-title">${isEdit ? 'Editar Professor' : 'Adicionar Professor'}</div>
    <div class="modal-field">
      <label>Nome</label>
      <input type="text" id="rot-modal-name" value="${isEdit ? esc(p.name) : ''}" placeholder="ex: Ana Silva" autocomplete="off">
    </div>
    <div class="modal-field">
      <label>Cor</label>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div id="rot-color-preview" style="width:36px;height:36px;border-radius:8px;border:1.5px solid rgba(0,0,0,.1);background:${rotModalColor};flex-shrink:0"></div>
        <label style="padding:6px 14px;border:1px solid var(--border);border-radius:7px;font-size:12px;cursor:pointer;background:var(--gray2);color:var(--navy);position:relative;overflow:hidden">
          Escolher cor
          <input type="color" id="rot-color-picker" value="${rotModalColor}" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%">
        </label>
      </div>
      <div id="rot-presets-fem">${presetDots(ROT_PRESETS_FEM)}</div>
      <div id="rot-presets-masc" style="margin-top:4px">${presetDots(ROT_PRESETS_MASC)}</div>
    </div>
    <div class="modal-field">
      <label>Turmas (separadas por vírgula)</label>
      <input type="text" id="rot-modal-turmas" value="${isEdit ? esc(p.turmas||'') : ''}" placeholder="ex: 8ºA, 9ºB, 11ºC" autocomplete="off">
    </div>
    <div class="modal-actions">
      <button class="btn" id="rot-modal-cancel">Cancelar</button>
      <button class="btn btn-primary" id="rot-modal-save">Guardar</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  document.getElementById('rot-color-picker').addEventListener('input', e => rotSetModalColor(e.target.value));
  overlay.querySelectorAll('[data-rotpreset]').forEach(el => {
    el.addEventListener('click', () => rotSetModalColor(el.dataset.rotpreset));
  });
  document.getElementById('rot-modal-cancel').addEventListener('click', rotCloseModal);
  overlay.addEventListener('click', e => { if(e.target === overlay) rotCloseModal(); });
  document.getElementById('rot-modal-save').addEventListener('click', rotSaveModal);
  setTimeout(() => document.getElementById('rot-modal-name').focus(), 50);
}
function rotSetModalColor(hex) {
  rotModalColor = hex;
  const prev = document.getElementById('rot-color-preview');
  if(prev) prev.style.background = hex;
  const picker = document.getElementById('rot-color-picker');
  if(picker) picker.value = hex;
  document.querySelectorAll('[data-rotpreset]').forEach(el => {
    el.style.borderColor = el.dataset.rotpreset === hex ? 'var(--navy)' : 'transparent';
  });
}
function rotCloseModal() {
  const el = document.getElementById('rot-modal-overlay');
  if(el) el.remove();
}
function rotSaveModal() {
  const name   = document.getElementById('rot-modal-name').value.trim();
  const turmas = document.getElementById('rot-modal-turmas').value.trim();
  if(!name) { document.getElementById('rot-modal-name').focus(); return; }
  const prof = { name, turmas, color: rotModalColor, textColor: rotContrastText(rotModalColor) };
  if(rotModalIdx >= 0) rotProfessors[rotModalIdx] = prof;
  else rotProfessors.push(prof);
  rotSaveProfs();
  rotCloseModal();
  render();
}

    '  padding-bottom:7px;border-bottom:2px solid #1a2d4a;margin-bottom:8px;flex-shrink:0}' +
    '#hdr-center{text-align:center;flex:1}' +
    '#hdr-center h1{font-size:16px;font-weight:800;color:#1a2d4a;line-height:1.2}' +
    '#hdr-center p{font-size:11px;color:#555;font-weight:600;margin-top:2px}' +

    '<scr' + 'ipt>window.onload=function(){window.print()}<' + '/scr' + 'ipt>' +

  );
  win.document.close();
}

function rotExportJson() {
  const payload = {
    version: 1,
    professors: rotProfessors,
    map1: rotMap1,
    locked: rotLocked,
    SLOTS: rotSLOTS
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'mapa_rotacao.json';
  a.click();
  URL.revokeObjectURL(url);
}

function rotImportJson(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.professors && !data.map1) { alert('Ficheiro inválido: não contém dados de rotação.'); return; }
      if (!confirm('Importar mapa? Os dados de Professores e Mapa 1 atuais serão substituídos.')) return;
      if (data.professors) rotProfessors = data.professors;
      if (data.map1)       rotMap1       = data.map1;
      if (data.locked)     rotLocked     = data.locked;
      if (data.SLOTS)      rotSLOTS      = data.SLOTS;
      rotSaveMap();
      rotSaveProfs();
      render();
    } catch(err) {
      alert('Erro ao ler o ficheiro: ' + err.message);
    }
  };
  reader.readAsText(file);
}

function attachRotacaoEvents() {
  // Tabs
  document.querySelectorAll('[data-rotmap]').forEach(btn => {
    btn.addEventListener('click', () => {
      rotCurrentView = 'map';
      rotCurrentMap = +btn.dataset.rotmap;
      render();
    });
  });
  document.querySelectorAll('[data-rotview]').forEach(btn => {
    btn.addEventListener('click', () => {
      rotCurrentView = btn.dataset.rotview;
      render();
    });
  });

  // Exportar / Importar JSON
  const expJsonBtn = document.getElementById('rotExportJsonBtn');
  if(expJsonBtn) expJsonBtn.addEventListener('click', rotExportJson);
  const impJsonInp = document.getElementById('rotImportJsonInput');
  if(impJsonInp) impJsonInp.addEventListener('change', e => { rotImportJson(e.target.files[0]); e.target.value=''; });

  // Exportar PDF
  const pdfBtn = document.getElementById('rotExportPdfBtn');
  if(pdfBtn) pdfBtn.addEventListener('click', rotExportPDF);

  // Adicionar professor
  const addBtn = document.getElementById('rotAddProfBtn');
  if(addBtn) addBtn.addEventListener('click', () => rotOpenModal());

  // Editar / apagar professor
  document.querySelectorAll('.rot-edit-prof').forEach(btn => {
    btn.addEventListener('click', () => rotOpenModal(+btn.dataset.idx));
  });
  document.querySelectorAll('.rot-del-prof').forEach(btn => {
    btn.addEventListener('click', () => {
      if(!confirm(`Remover "${rotProfessors[+btn.dataset.idx].name}"?`)) return;
      rotProfessors.splice(+btn.dataset.idx, 1);
      rotSaveProfs();
      render();
    });
  });

  // Células editáveis do Mapa 1
  document.querySelectorAll('.rot-cell').forEach(inp => {
    inp.addEventListener('change', e => {
      const d=+e.target.dataset.d, s=+e.target.dataset.s, c=+e.target.dataset.c;
      rotMap1[d][s][c] = e.target.value.trim();
      rotSaveMap();
      render();
    });
    inp.addEventListener('dblclick', e => {
      const d=+e.target.dataset.d, s=+e.target.dataset.s, c=+e.target.dataset.c;
      rotLocked[d][s][c] = !rotLocked[d][s][c];
      rotSaveMap();
      render();
    });
    // hover style
    inp.addEventListener('mouseenter', e => { if(!e.target.classList.contains('locked')) e.target.style.borderColor='var(--border)'; });
    inp.addEventListener('mouseleave', e => { if(!e.target.classList.contains('locked')) e.target.style.borderColor='transparent'; });
    inp.addEventListener('focus', e => { if(!rotLocked[+e.target.dataset.d][+e.target.dataset.s][+e.target.dataset.c]) e.target.style.borderColor='var(--blue)'; });
    inp.addEventListener('blur', e => { if(!rotLocked[+e.target.dataset.d][+e.target.dataset.s][+e.target.dataset.c]) e.target.style.borderColor='transparent'; });
  });

  // Horas editáveis
  document.querySelectorAll('.rot-time-input').forEach(inp => {
    inp.addEventListener('change', e => {
      const si=+e.target.dataset.si, t=+e.target.dataset.t;
      rotSLOTS[si][t] = e.target.value.trim();
      rotSaveMap();
    });
  });
}

// ══════════════════════════════════════════════════════════════
// TORNEIOS INTRATURMA — Estado e lógica completa
// Dados guardados no localStorage (independente do Supabase)
// ══════════════════════════════════════════════════════════════
let trState = {
  tournaments: [],
  currentId: null
};
let trCurrentTab = 'tab-torneos'; // sub-separador ativo dentro de Torneios

function trLoad() {
  try {
    trState.tournaments = JSON.parse(localStorage.getItem('dossier_ef_tournaments') || '[]');
    trState.currentId = localStorage.getItem('dossier_ef_current') || null;
  } catch(e) { trState = { tournaments: [], currentId: null }; }
}
function trSave() {
  try {
    localStorage.setItem('dossier_ef_tournaments', JSON.stringify(trState.tournaments));
    if (trState.currentId) localStorage.setItem('dossier_ef_current', trState.currentId);
  } catch(e) {}
}
function trCurrent() {
  return trState.tournaments.find(t => t.id === trState.currentId) || null;
}
function trNotify(msg) {
  const n = document.getElementById('trNotif');
  if (!n) return;
  n.textContent = msg; n.style.opacity = '1';
  setTimeout(() => { n.style.opacity = '0'; }, 2500);
}
function trFormatPT(dateStr) {
  if (!dateStr) return '';
  const [y, m, d] = dateStr.split('-');
  return d + '/' + m + '/' + y;
}
function trIsPow2(n) { return n > 1 && (n & (n-1)) === 0; }
function trNextPow2(n) { let p = 2; while (p < n) p *= 2; return p; }

// ── Aba: Jogos ───────────────────────────────────────────────
function trRenderJogosTab() {
  const t = trCurrent();
  if (!t || !t.matches.length) return `<div class="tr-empty"><div class="icon">🎮</div><p>Seleciona um torneio e gera os jogos primeiro.</p></div>`;
  const done = t.matches.filter(m => m.played && !m.bye).length;
  const total = t.matches.filter(m => !m.bye).length;

  // Botões de controlo (Swiss, Knockout avançar, etc.)
  let ctrlBtns = '';
  if (t.format === 'swiss') {
    const rounds = [...new Set(t.matches.map(m => m.round))];
    const curR = Math.max(...rounds);
    const totalR = t.swissRounds || Math.ceil(Math.log2(t.teams.length));
    const allPlayed = t.matches.filter(m=>m.round===curR&&!m.bye).every(m=>m.played);
    ctrlBtns = `<span style="background:var(--sky);color:var(--blue2);padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">Ronda ${curR}/${totalR}</span>`;
    if (allPlayed && curR < totalR) ctrlBtns += ` <button class="btn btn-primary btn-sm" onclick="trAdvanceSwiss()">⚡ Próxima ronda</button>`;
  } else if (t.format === 'knockout') {
    const rounds = [...new Set(t.matches.map(m => m.round))];
    const curR = Math.max(...rounds);
    const curMs = t.matches.filter(m=>m.round===curR&&!m.bye);
    const allPlayed = curMs.length > 0 && curMs.every(m=>m.played);
    const winners = curMs.filter(m=>m.played).map(m=>m.homeScore>m.awayScore?m.home:m.away);
    if (allPlayed && winners.length > 1) ctrlBtns = `<button class="btn btn-primary btn-sm" onclick="trAdvanceKnockout()">⚡ Próxima ronda</button>`;
  } else if (t.format === 'groups') {
    const grpMs = t.matches.filter(m=>m.groupPhase);
    const koMs = t.matches.filter(m=>m.knockout);
    const allGrpPlayed = grpMs.length > 0 && grpMs.every(m=>m.played);
    if (allGrpPlayed && !koMs.length) {
      ctrlBtns = `<button class="btn btn-primary btn-sm" onclick="trGenerateGroupsKO()">⚡ Gerar fase eliminatória</button>`;
    } else if (koMs.length) {
      const koRounds = [...new Set(koMs.map(m=>m.round))];
      const curKoR = Math.max(...koRounds);
      const curKoMs = koMs.filter(m=>m.round===curKoR&&!m.bye);
      const allKoPlayed = curKoMs.length > 0 && curKoMs.every(m=>m.played);
      const koWinners = koMs.filter(m=>m.round===curKoR).map(m=>m.bye?(m.home!=='BYE'?m.home:m.away):(m.played?(m.homeScore>m.awayScore?m.home:m.away):null)).filter(Boolean);
      if (allKoPlayed && koWinners.length > 1) ctrlBtns = `<button class="btn btn-primary btn-sm" onclick="trAdvanceKnockout()">⚡ Próxima ronda</button>`;
    }
  } else if (t.format === 'double_elim') {
    const deMs = t.matches.filter(m=>m.de);
    const wMs = deMs.filter(m=>m.bracket==='W');
    const lMs = deMs.filter(m=>m.bracket==='L');
    const gfMs = deMs.filter(m=>m.bracket==='GF');
    const curWR = wMs.length ? Math.max(...wMs.map(m=>m.wRound)) : 0;
    const curLR = lMs.length ? Math.max(...lMs.map(m=>m.wRound)) : 0;
    const wDone = wMs.filter(m=>m.wRound===curWR&&!m.bye).every(m=>m.played);
    const lCur = lMs.filter(m=>m.wRound===curLR&&!m.bye);
    const lDone = lCur.length === 0 || lCur.every(m=>m.played);
    const lastGf = gfMs[gfMs.length-1];
    const tourOver = lastGf && lastGf.played;
    const gfPending = gfMs.length > 0 && lastGf && !lastGf.played;
    if (!tourOver && !gfPending && wDone && lDone) {
      ctrlBtns = `<button class="btn btn-primary btn-sm" onclick="trAdvanceDE()">⚡ Avançar bracket</button>`;
    }
  }

  // Render de matches
  let matchesHtml = '';
  if (t.format === 'knockout') {
    const rounds = [...new Set(t.matches.map(m=>m.round))].sort((a,b)=>a-b);
    const total2 = rounds.length;
    rounds.forEach((r, idx) => {
      const rMs = t.matches.filter(m=>m.round===r);
      const fromEnd = total2 - idx;
      const lbl = fromEnd===1?'Final':fromEnd===2?'Meia-Final':fromEnd===3?'Quartos-de-Final':'Ronda '+r;
      matchesHtml += `<div class="tr-round-header"><span class="tr-round-label">${lbl}</span><div class="tr-round-line"></div></div>`;
      matchesHtml += rMs.map(m => trMatchCard(m)).join('');
    });
  } else if (t.format === 'double_elim') {
    matchesHtml = `<div class="tr-bracket-wrap"><div id="tr-bracket" class="tr-bracket"></div></div>`;
  } else if (t.format === 'groups') {
    const grpMs = t.matches.filter(m=>m.groupPhase);
    const grpNames = [...new Set(grpMs.map(m=>m.group).filter(Boolean))];
    grpNames.forEach(g => {
      matchesHtml += `<div class="tr-round-header"><span class="tr-round-label">${g}</span><div class="tr-round-line"></div></div>`;
      matchesHtml += grpMs.filter(m=>m.group===g).map(m=>trMatchCard(m)).join('');
    });
    const koMs = t.matches.filter(m=>m.knockout);
    if (koMs.length) {

function trMatchCard(m) {
  const homeWin = m.played && m.homeScore > m.awayScore;
  const awayWin = m.played && m.awayScore > m.homeScore;
  const draw = m.played && m.homeScore === m.awayScore;
  if (m.bye || m.away === 'BYE') return '';
  return `<div class="tr-match-card${m.played?' played':''}" id="tr-match-${m.id}">
    <div class="tr-match-team">
      <span class="tr-team-name" style="${homeWin?'color:var(--green)':''}">${esc(m.home)}</span>
      ${m.played?`<span class="tr-badge ${homeWin?'tr-badge-win':awayWin?'tr-badge-loss':'tr-badge-draw'}">${homeWin?'V':awayWin?'D':'E'}</span>`:''}
      <input class="tr-score-input" type="number" min="0" id="tr-hs-${m.id}" value="${m.homeScore!==null?m.homeScore:''}" placeholder="–">
    </div>
    <div class="tr-match-center">
      <span class="tr-vs">VS</span>
      <button class="tr-save-btn" onclick="trSaveMatch(${m.id})">Guardar</button>
    </div>
    <div class="tr-match-team right">
      <span class="tr-team-name" style="${awayWin?'color:var(--green)':''}">${esc(m.away)}</span>
      ${m.played?`<span class="tr-badge ${awayWin?'tr-badge-win':homeWin?'tr-badge-loss':'tr-badge-draw'}">${awayWin?'V':homeWin?'D':'E'}</span>`:''}
      <input class="tr-score-input" type="number" min="0" id="tr-as-${m.id}" value="${m.awayScore!==null?m.awayScore:''}" placeholder="–">
    </div>
  </div>`;
}

function trRenderClassTab() {
  const t = trCurrent();
  if (!t) return `<div class="tr-empty"><div class="icon">📊</div><p>Seleciona um torneio primeiro.</p></div>`;
  const standings = trComputeStandings(t);
  if (!standings.length) return `<div class="tr-form-card"><div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:10px">${esc(t.name)}</div><div class="tr-empty" style="padding:20px"><p>Ainda não há resultados.</p></div></div>`;

  const tableRows = standings.map((s,i) => {
    const pos = i+1;
    const cls = pos===1?'tr-pos-1':pos===2?'tr-pos-2':pos===3?'tr-pos-3':'tr-pos-n';
    const gd = s.gd >= 0 ? '+'+s.gd : ''+s.gd;
    return `<tr>
      <td><span class="tr-pos-badge ${cls}">${pos}</span></td>
      <td style="font-weight:600">${esc(s.name)}</td>
      <td>${s.played}</td><td>${s.wins}</td><td>${s.draws}</td><td>${s.losses}</td>
      <td>${s.gf}</td><td>${s.ga}</td>
      <td style="color:${s.gd>=0?'var(--green)':'var(--red)'}">${gd}</td>
      <td class="pts">${s.pts}</td>
    </tr>`;
  }).join('');

  let html = '';
  if (t.format === 'groups') {
    const grpMs = t.matches.filter(m=>m.groupPhase);
    const grpNames = [...new Set(grpMs.map(m=>m.group).filter(Boolean))];
    html = grpNames.map(g => {
      const gs = trComputeGroupStandings(grpMs.filter(m=>m.group===g), t.ptsWin, t.ptsDraw);
      if (!gs.length) return '';
      const qualify = t.groupsQualify || 2;
      const rows = gs.map((s,i) => {
        const pos=i+1, q=pos<=qualify;
        const cls=pos===1?'tr-pos-1':pos===2?'tr-pos-2':pos===3?'tr-pos-3':'tr-pos-n';
        const gd=s.gd>=0?'+'+s.gd:''+s.gd;
        return `<tr${q?' style="border-left:3px solid var(--green)"':''}>
          <td><span class="tr-pos-badge ${cls}">${pos}</span></td>
          <td style="font-weight:600">${esc(s.name)}${q?' <span style="font-size:10px;background:var(--green2);color:var(--green);padding:1px 6px;border-radius:10px;font-weight:700">Q</span>':''}</td>
          <td>${s.played}</td><td>${s.wins}</td><td>${s.draws}</td><td>${s.losses}</td>
          <td>${s.gf}</td><td>${s.ga}</td>
          <td style="color:${s.gd>=0?'var(--green)':'var(--red)'}">${gd}</td>
          <td class="pts">${s.pts}</td></tr>`;
      }).join('');
      return `<div style="margin-bottom:16px"><div class="tr-round-header"><span class="tr-round-label">${g}</span><div class="tr-round-line"></div></div>
        <div style="overflow-x:auto"><table class="tr-standings-table"><thead><tr><th>#</th><th>Equipa</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GM</th><th>GS</th><th>DG</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
    }).join('');
  } else {
    html = `<div style="overflow-x:auto"><table class="tr-standings-table"><thead><tr><th>#</th><th>Equipa</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GM</th><th>GS</th><th>DG</th><th>Pts</th></tr></thead><tbody>${tableRows}</tbody></table></div>`;
  }

  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:var(--navy)">${esc(t.name)}</div>
      <button class="btn btn-sm" onclick="trGoTab('tab-class')">↺ Atualizar</button>
    </div>
    <div class="tr-form-card" style="padding:0;overflow:hidden">
      ${html}
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-top:10px">
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray)"><span style="background:#FAC775;width:13px;height:13px;border-radius:50%;display:inline-block"></span> 1º lugar</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray)"><span style="background:#D3D1C7;width:13px;height:13px;border-radius:50%;display:inline-block"></span> 2º lugar</div>
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gray)"><span style="background:#F5C4B3;width:13px;height:13px;border-radius:50%;display:inline-block"></span> 3º lugar</div>
    </div>

// ── Ações / lógica ───────────────────────────────────────────
function trGoTab(tabId) {
  trCurrentTab = tabId;
  currentTab = 'torneios';
  render();
}

function trToggleNewForm() {
  const f = document.getElementById('trNewForm');
  if (!f) { render(); return; }
  f.style.display = f.style.display === 'none' ? 'block' : 'none';
  if (f.style.display !== 'none') trToggleGroups();
}

function trToggleGroups() {
  const fmt = document.getElementById('tr-format')?.value;
  if (!fmt) return;
  const ngRow = document.getElementById('tr-numgroups-row');
  const swRow = document.getElementById('tr-swissrounds-row');
  const gkRow = document.getElementById('tr-groups-ko-row');
  if (ngRow) ngRow.style.display = fmt === 'league' ? '' : 'none';
  if (swRow) swRow.style.display = fmt === 'swiss' ? '' : 'none';
  if (gkRow) gkRow.style.display = fmt === 'groups' ? '' : 'none';
  trCalcUpdate('teams');
}

function trEstimateMatches(numTeams, format, numGroups) {
  if (!numTeams || numTeams < 2) return null;
  if (format === 'league') {
    const g = Math.max(1, numGroups || 1);
    let total = 0;
    const perGroup = Math.floor(numTeams / g);
    const extra = numTeams % g;
    for (let i = 0; i < g; i++) { const n = perGroup + (i < extra ? 1 : 0); total += (n*(n-1))/2; }
    return total;
  } else if (format === 'knockout') { return numTeams - 1; }
  else if (format === 'swiss') {
    const sr = parseInt(document.getElementById('tr-swiss-rounds')?.value) || 0;
    const r = sr > 0 ? sr : Math.ceil(Math.log2(numTeams));
    return Math.floor(numTeams/2) * r;
  } else if (format === 'double_elim') { return Math.max(1, numTeams*2-2); }
  else if (format === 'groups') {
    const g = numTeams <= 8 ? 2 : 4; let gm = 0;
    const perGroup = Math.floor(numTeams/g); const extra = numTeams%g;
    for (let i = 0; i < g; i++) { const n = perGroup+(i<extra?1:0); gm += (n*(n-1))/2; }
    return gm + (g*2-1);
  }
  return null;
}

function trCalcUpdate(lastChanged) {
  const fmt = document.getElementById('tr-format')?.value || 'league';
  const numTeams = parseInt(document.getElementById('tr-num-teams')?.value) || 0;
  const numGroups = parseInt(document.getElementById('tr-num-groups')?.value) || 1;
  const numFields = parseInt(document.getElementById('tr-num-fields')?.value) || 1;
  const matchDur = parseFloat(document.getElementById('tr-match-dur')?.value) || 0;
  const breakDur = parseFloat(document.getElementById('tr-break-dur')?.value) || 0;
  const totalDur = parseFloat(document.getElementById('tr-total-dur')?.value) || 0;
  const numMatches = trEstimateMatches(numTeams, fmt, numGroups);
  const infoEl = document.getElementById('tr-calc-info');
  const summaryEl = document.getElementById('tr-calc-summary');
  if (!infoEl || !summaryEl) return;
  if (numMatches !== null) {
    const rounds = Math.ceil(numMatches / numFields);
    infoEl.textContent = '· ' + numMatches + ' jogos · ' + rounds + ' rondas';
  } else { infoEl.textContent = ''; }
  if (!numMatches || numMatches < 1) { summaryEl.textContent = ''; return; }
  const rounds = Math.ceil(numMatches / numFields);
  if (lastChanged === 'total' && totalDur > 0) {
    const newMatch = (totalDur - (rounds-1)*breakDur) / rounds;
    if (newMatch > 0) { const el = document.getElementById('tr-match-dur'); if(el) el.value = Math.round(newMatch); }
  } else if ((lastChanged === 'match'||lastChanged==='break'||lastChanged==='fields'||lastChanged==='teams') && matchDur > 0) {
    const newTotal = rounds * matchDur + (rounds-1) * breakDur;
    const el = document.getElementById('tr-total-dur'); if(el) el.value = Math.round(newTotal);
  }
  const md = parseFloat(document.getElementById('tr-match-dur')?.value) || 0;
  const td = parseFloat(document.getElementById('tr-total-dur')?.value) || 0;
  if (md > 0 && td > 0) {
    const h = Math.floor(td/60), m = Math.round(td%60);
    const durStr = h > 0 ? h+'h'+(m>0?m+'min':'') : m+' min';
    summaryEl.textContent = rounds+' ronda'+(rounds!==1?'s':'')+' × '+md+'min'+(breakDur>0?' + '+breakDur+'min pausa':'')+' = '+durStr+' total';
  } else { summaryEl.textContent = ''; }
}

function trCreateTournament() {
  const name = document.getElementById('tr-name')?.value.trim();
  if (!name) { trNotify('⚠️ Dá um nome ao torneio!'); return; }
  const sport = document.getElementById('tr-sport')?.value.trim();
  const cls = document.getElementById('tr-class')?.value.trim();
  const format = document.getElementById('tr-format')?.value || 'league';
  const ptsWin = parseInt(document.getElementById('tr-pts-win')?.value) || 3;
  const ptsDraw = parseInt(document.getElementById('tr-pts-draw')?.value) || 1;
  const numGroups = parseInt(document.getElementById('tr-num-groups')?.value) || 1;
  const swissRounds = parseInt(document.getElementById('tr-swiss-rounds')?.value) || null;
  const groupsNum = parseInt(document.getElementById('tr-groups-num')?.value) || 2;
  const groupsQualify = parseInt(document.getElementById('tr-groups-qualify')?.value) || 2;

function trDistributeToGroups(teams, numGroups) {
  const shuffled = [...teams].sort(() => Math.random() - 0.5);
  const perGroup = Math.floor(shuffled.length / numGroups);
  const extra = shuffled.length % numGroups;
  const groups = Array.from({ length: numGroups }, (_, i) => ({ name: 'Grupo '+String.fromCharCode(65+i), teams: [] }));
  let idx = 0;
  for (let g = 0; g < numGroups; g++) {
    const size = perGroup + (g < extra ? 1 : 0);
    for (let j = 0; j < size; j++) groups[g].teams.push(shuffled[idx++]);
  }
  return groups;
}

function trGenerateLeague(teams) {
  const arr = [...teams]; let round=1, matchId=1;
  const isBye = arr.length % 2 !== 0;
  if (isBye) arr.push({ name:'BYE', color:'#888' });
  const rounds = arr.length - 1, half = arr.length / 2;
  const fixed = arr[0], rotating = arr.slice(1);
  const matches = [];
  for (let r = 0; r < rounds; r++) {
    const rt = [fixed, ...rotating];
    for (let i = 0; i < half; i++) {
      const a=rt[i], b=rt[rt.length-1-i];
      if (a.name!=='BYE' && b.name!=='BYE') matches.push({ id:matchId++, round, home:a.name, away:b.name, homeScore:null, awayScore:null, played:false });
    }
    rotating.push(rotating.shift()); round++;
  }
  return matches;
}

function trGenerateMatches() {
  const t = trCurrent();
  if (!t) return;
  if (t.teams.length < 2) { trNotify('⚠️ Precisas de pelo menos 2 equipas!'); return; }
  if (t.matches.length && !confirm('Já existem jogos. Regenerar irá apagar os resultados. Continuar?')) return;
  let matchId = 1;
  if (t.format === 'league') {
    if ((t.numGroups||1) <= 1) { t.matches = trGenerateLeague(t.teams); }
    else {
      const groups = trDistributeToGroups(t.teams, t.numGroups||1);
      t.matches = [];
      groups.forEach(g => { trGenerateLeague(g.teams).forEach(m => { m.id=matchId++; m.group=g.name; t.matches.push(m); }); });
    }
  } else if (t.format === 'knockout') {
    const shuffled = [...t.teams].sort(()=>Math.random()-0.5);
    const slots = trNextPow2(shuffled.length);
    const padded = [...shuffled]; while(padded.length<slots) padded.push(null);
    t.matches = [];
    for (let i=0;i<slots;i+=2) {
      const a=padded[i], b=padded[i+1];
      if(a&&b) t.matches.push({id:matchId++,round:1,home:a.name,away:b.name,homeScore:null,awayScore:null,played:false,knockout:true});
      else if(a||b) { const tm=a||b; t.matches.push({id:matchId++,round:1,home:tm.name,away:'BYE',homeScore:1,awayScore:0,played:true,knockout:true,bye:true}); }
    }
  } else if (t.format === 'swiss') {
    const totalR = t.swissRounds || Math.ceil(Math.log2(t.teams.length));
    const shuffled = [...t.teams].sort(()=>Math.random()-0.5);
    const half = Math.floor(shuffled.length/2);
    t.matches = [];
    for (let i=0;i<half;i++) t.matches.push({id:matchId++,round:1,home:shuffled[i].name,away:shuffled[i+half].name,homeScore:null,awayScore:null,played:false,swiss:true});
    if (shuffled.length%2!==0) t.matches.push({id:matchId++,round:1,home:shuffled[shuffled.length-1].name,away:'BYE',homeScore:1,awayScore:0,played:true,bye:true,swiss:true});
  } else if (t.format === 'double_elim') {
    const shuffled = [...t.teams].sort(()=>Math.random()-0.5);
    const slots = trNextPow2(shuffled.length);
    const padded = shuffled.map(x=>x.name); while(padded.length<slots) padded.push(null);
    t.matches = [];
    for (let i=0;i<slots;i+=2) {
      const a=padded[i], b=padded[i+1];
      if(a&&b) t.matches.push({id:matchId++,bracket:'W',wRound:1,slot:i/2,home:a,away:b,homeScore:null,awayScore:null,played:false,de:true});
      else if(a||b) { const tm=a||b; t.matches.push({id:matchId++,bracket:'W',wRound:1,slot:i/2,home:tm,away:'BYE',homeScore:1,awayScore:0,played:true,de:true,bye:true}); }
    }
  } else { // groups
    const numG = t.groupsNum || 2;
    const qualify = t.groupsQualify || 2;
    const groups = trDistributeToGroups(t.teams, numG);
    t.matches = [];
    groups.forEach(g => { trGenerateLeague(g.teams).forEach(m => { m.id=matchId++; m.group=g.name; m.groupPhase=true; t.matches.push(m); }); });
  }
  trSave();
  trNotify('⚡ ' + t.matches.length + ' jogos gerados!');
  trGoTab('tab-jogos');
}

function trSaveMatch(id) {

  if ((t.format==='knockout'||t.format==='double_elim') && hs===as2) { trNotify('⚠️ Em eliminatórias não pode haver empate!'); return; }

}

}

function trAdvanceSwiss() {
  const t = trCurrent(); if (!t) return;
  const matches = t.matches;
  const totalRounds = t.swissRounds || Math.ceil(Math.log2(t.teams.length));
  const playedRounds = [...new Set(matches.map(m=>m.round))];
  const nextRound = playedRounds.length + 1;
  if (nextRound > totalRounds) { trNotify('✅ Todas as rondas já foram geradas!'); return; }
  const standings = trComputeStandings(t);
  const ranked = standings.map(s=>s.name);
  const usedPairs = new Set(matches.map(m=>[m.home,m.away].sort().join('|')));
  const available = [...ranked];
  const newMs = [];
  let matchId = matches.reduce((mx,m)=>Math.max(mx,m.id),0)+1;
  const paired = new Set();
  for (let i=0;i<available.length;i++) {
    if (paired.has(available[i])) continue;
    for (let j=i+1;j<available.length;j++) {
      if (paired.has(available[j])) continue;
      const key = [available[i],available[j]].sort().join('|');
      if (!usedPairs.has(key)) { newMs.push({id:matchId++,round:nextRound,home:available[i],away:available[j],homeScore:null,awayScore:null,played:false,swiss:true}); paired.add(available[i]); paired.add(available[j]); break; }
    }
    if (!paired.has(available[i])) { for(let j=i+1;j<available.length;j++) { if(!paired.has(available[j])) { newMs.push({id:matchId++,round:nextRound,home:available[i],away:available[j],homeScore:null,awayScore:null,played:false,swiss:true}); paired.add(available[i]); paired.add(available[j]); break; } } }
  }
  const unpaired = available.filter(a=>!paired.has(a));
  if (unpaired.length) newMs.push({id:matchId++,round:nextRound,home:unpaired[0],away:'BYE',homeScore:1,awayScore:0,played:true,bye:true,swiss:true});
  t.matches.push(...newMs);
  trSave(); trGoTab('tab-jogos'); trNotify('⚡ Ronda '+nextRound+' gerada!');
}

function trAdvanceKnockout() {
  const t = trCurrent(); if (!t) return;
  const rounds = [...new Set(t.matches.map(m=>m.round))].sort((a,b)=>a-b);
  const curR = Math.max(...rounds);
  const curMs = t.matches.filter(m=>m.round===curR);
  const winners = curMs.map(m=>{ if(m.bye) return m.home!=='BYE'?m.home:m.away; if(m.played) return m.homeScore>m.awayScore?m.home:m.away; return null; });
  if (winners.includes(null)) { trNotify('⚠️ Ainda há jogos por disputar!'); return; }
  if (winners.length===1) { trNotify('🏆 '+winners[0]+' é o vencedor!'); return; }
  let participants = [...winners];
  if (participants.length%2!==0) {
    const losers = curMs.filter(m=>m.played&&!m.bye&&m.away!=='BYE').map(m=>{ const ln=m.homeScore>m.awayScore?m.away:m.home; const lgf=m.homeScore>m.awayScore?m.awayScore:m.homeScore; const lga=m.homeScore>m.awayScore?m.homeScore:m.awayScore; return {name:ln,gd:lgf-lga,gf:lgf}; }).sort((a,b)=>b.gd-a.gd||b.gf-a.gf);
    if (losers.length) participants.push(losers[0].name);
  }
  const nextR = curR+1;
  let matchId = t.matches.reduce((mx,m)=>Math.max(mx,m.id),0)+1;
  for (let i=0;i<participants.length;i+=2) {
    const a=participants[i], b=participants[i+1]||null;
    if(a&&b&&b!=='BYE') t.matches.push({id:matchId++,round:nextR,home:a,away:b,homeScore:null,awayScore:null,played:false,knockout:true});
    else if(a) t.matches.push({id:matchId++,round:nextR,home:a,away:'BYE',homeScore:1,awayScore:0,played:true,knockout:true,bye:true});
  }
  trSave(); trGoTab('tab-jogos'); trNotify('⚡ Ronda '+nextR+' gerada!');
}

function trGenerateGroupsKO() {
  const t = trCurrent(); if (!t) return;
  const qualify = t.groupsQualify || 2;
  const grpMs = t.matches.filter(m=>m.groupPhase);
  const grpNames = [...new Set(grpMs.map(m=>m.group).filter(Boolean))];
  const grpRankings = {};
  grpNames.forEach(g => { grpRankings[g] = trComputeGroupStandings(grpMs.filter(m=>m.group===g), t.ptsWin, t.ptsDraw); });
  const qualified = [];
  for (let pos=0;pos<qualify;pos++) { grpNames.forEach(g => { const s=grpRankings[g][pos]; if(s) qualified.push(s.name); }); }
  if (!qualified.length) { trNotify('⚠️ Sem equipas qualificadas!'); return; }
  let matchId = t.matches.reduce((mx,m)=>Math.max(mx,m.id),0)+1;
  // Cruzamentos: 1º Grupo A vs 2º Grupo B etc.
  const firsts = grpNames.map(g=>grpRankings[g][0]).filter(Boolean);
  const seconds = grpNames.map(g=>grpRankings[g][1]).filter(Boolean);
  for (let i=0;i<Math.min(firsts.length,seconds.length);i++) {
    const mirror = grpNames.length-1-i;
    const opp = seconds[mirror]||seconds[i];
    t.matches.push({id:matchId++,round:1,home:firsts[i].name,away:opp.name,homeScore:null,awayScore:null,played:false,knockout:true});
  }
  trSave(); trGoTab('tab-jogos'); trNotify('⚡ Fase eliminatória gerada!');
}

function trAdvanceDE() {
  const t = trCurrent(); if (!t) return;
  const matches = t.matches;
  let matchId = matches.reduce((mx,m)=>Math.max(mx,m.id),0)+1;
  const wMs = matches.filter(m=>m.de&&m.bracket==='W');
  const lMs = matches.filter(m=>m.de&&m.bracket==='L');
  const gfMs = matches.filter(m=>m.de&&m.bracket==='GF');
  const winner = m => m.bye?(m.home!=='BYE'?m.home:m.away):(m.homeScore>m.awayScore?m.home:m.away);
  const loser = m => m.bye?null:(m.homeScore>m.awayScore?m.away:m.home);
  function pairTeams(teams,bracket,wRound) {
    for (let i=0;i<teams.length;i+=2) {
      const a=teams[i], b=teams[i+1];
      if(a&&b) matches.push({id:matchId++,bracket,wRound,slot:Math.floor(i/2),home:a,away:b,homeScore:null,awayScore:null,played:false,de:true});
      else if(a) matches.push({id:matchId++,bracket,wRound,slot:Math.floor(i/2),home:a,away:'BYE',homeScore:1,awayScore:0,played:true,de:true,bye:true});
    }
  }
  if (gfMs.length > 0) {
    const gf1=gfMs[0]; if(!gf1.played){trNotify('⚠️ Disputa a Grande Final primeiro!');return;}
    if (gfMs.length===1) {
      const gf1W=winner(gf1), wTeam=gf1.home;
      if (gf1W!==wTeam) { matches.push({id:matchId++,bracket:'GF',wRound:gf1.wRound,slot:1,home:gf1.home,away:gf1.away,homeScore:null,awayScore:null,played:false,de:true,gf2:true}); trSave(); trGoTab('tab-jogos'); trNotify('🔥 Jogo decisivo!'); return; }
      else { trNotify('🏆 '+gf1W+' vence!'); return; }
    }
    const gf2=gfMs[gfMs.length-1];
    if(gf2.played){trNotify('🏆 '+winner(gf2)+' vence!');return;}
    trNotify('⚠️ Disputa o jogo decisivo primeiro!'); return;
  }
  const curWR = wMs.length?Math.max(...wMs.map(m=>m.wRound)):0;
  const wRoundMs = wMs.filter(m=>m.wRound===curWR);
  if (!wRoundMs.every(m=>m.played)){trNotify('⚠️ Termina os jogos do bracket Vencedores primeiro!');return;}
  const wWinners=wRoundMs.map(winner).filter(Boolean);
  const wLosers=wRoundMs.map(loser).filter(Boolean);
  const lForThisW=lMs.filter(m=>m.wRound===curWR);
  if (lForThisW.length===0) {
    if (wLosers.length>0) {
      const prevLR=lMs.length?Math.max(...lMs.map(m=>m.wRound)):-1;
      const lPrev=lMs.filter(m=>m.wRound===prevLR);
      const lSurv=lPrev.map(winner).filter(Boolean);
      let lTeams;
      if(!lSurv.length) lTeams=[...wLosers];
      else { const combined=[]; const mx=Math.max(lSurv.length,wLosers.length); for(let i=0;i<mx;i++){if(lSurv[i])combined.push(lSurv[i]);if(wLosers[i])combined.push(wLosers[i]);} lTeams=combined; }
      pairTeams(lTeams,'L',curWR);
      trSave(); trGoTab('tab-jogos'); trNotify('⚡ Bracket Perdedores gerado!'); return;
    }
  } else {
    if(!lForThisW.every(m=>m.played)){trNotify('⚠️ Termina os jogos do bracket Perdedores primeiro!');return;}
  }
  const lSurvivors=lForThisW.map(winner).filter(Boolean);
  if(wWinners.length===1&&lSurvivors.length===1){
    matches.push({id:matchId++,bracket:'GF',wRound:curWR+1,slot:0,home:wWinners[0],away:lSurvivors[0],homeScore:null,awayScore:null,played:false,de:true});
    trSave(); trGoTab('tab-jogos'); trNotify('🏆 Grande Final gerada!'); return;
  }
  pairTeams(wWinners,'W',curWR+1);
  trSave(); trGoTab('tab-jogos'); trNotify('⚡ Próxima ronda Vencedores!');
}

function trComputeStandings(t) {
  const map = {};
  t.teams.forEach(team => { map[team.name]={name:team.name,played:0,wins:0,draws:0,losses:0,gf:0,ga:0,gd:0,pts:0}; });
  t.matches.filter(m=>m.played&&!m.bye&&m.away!=='BYE').forEach(m => {
    const h=map[m.home], a=map[m.away]; if(!h||!a) return;
    h.played++;a.played++;h.gf+=m.homeScore;h.ga+=m.awayScore;a.gf+=m.awayScore;a.ga+=m.homeScore;
    if(m.homeScore>m.awayScore){h.wins++;h.pts+=t.ptsWin;a.losses++;}
    else if(m.awayScore>m.homeScore){a.wins++;a.pts+=t.ptsWin;h.losses++;}
    else{h.draws++;a.draws++;h.pts+=t.ptsDraw;a.pts+=t.ptsDraw;}
  });
  Object.values(map).forEach(s=>s.gd=s.gf-s.ga);
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

function trComputeGroupStandings(gMs, ptsWin, ptsDraw) {
  const map={};
  const teams=[...new Set(gMs.flatMap(m=>[m.home,m.away]).filter(n=>n!=='BYE'))];
  teams.forEach(name=>map[name]={name,played:0,wins:0,draws:0,losses:0,gf:0,ga:0,gd:0,pts:0});
  gMs.filter(m=>m.played&&m.away!=='BYE').forEach(m=>{
    const h=map[m.home],a=map[m.away]; if(!h||!a) return;
    h.played++;a.played++;h.gf+=m.homeScore;h.ga+=m.awayScore;a.gf+=m.awayScore;a.ga+=m.homeScore;
    if(m.homeScore>m.awayScore){h.wins++;h.pts+=ptsWin;a.losses++;}
    else if(m.awayScore>m.homeScore){a.wins++;a.pts+=ptsWin;h.losses++;}
    else{h.draws++;a.draws++;h.pts+=ptsDraw;a.pts+=ptsDraw;}
  });
  Object.values(map).forEach(s=>s.gd=s.gf-s.ga);
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.name.localeCompare(b.name));
}

// TEMPORIZADOR INTRATURMA
