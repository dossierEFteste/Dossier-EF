let _trTimer = {
  interval: null,
  phase: 'game',
  state: 'stopped',
  elapsed: 0,
  totalGame: 600,
  totalBreak: 120,
  audioCtx: null,  // contexto partilhado — criado no 1.º toque do utilizador
};

function trTimerGetDurations() {
  const gMin = parseFloat(document.getElementById('tr-timer-match-dur')?.value) || 10;
  const bMin = parseFloat(document.getElementById('tr-timer-break-dur')?.value) || 2;
  return { game: Math.round(gMin * 60), brk: Math.round(bMin * 60) };
}

function trTimerUpdateUI() {
  const disp = document.getElementById('tr-timer-display');
  const lbl  = document.getElementById('tr-timer-label');
  const phase = document.getElementById('tr-timer-phase');
  const playBtn = document.getElementById('tr-timer-play');
  if (!disp) return;

  const dur = _trTimer.phase === 'game' ? _trTimer.totalGame : _trTimer.totalBreak;
  const remaining = Math.max(0, dur - _trTimer.elapsed);
  const m = Math.floor(remaining / 60);
  const s = remaining % 60;
  disp.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

  disp.className = 'tr-timer-display';
  disp.style.color = _trTimer.state === 'stopped' ? 'rgba(255,255,255,0.35)'
    : _trTimer.state === 'paused'  ? '#fbbf24'
    : _trTimer.phase === 'break'   ? '#fbbf24'
    : '#ffffff';

  // Barra de progresso
  const prog = document.getElementById('tr-timer-progress');
  if (prog) {
    const pct = Math.min(100, (_trTimer.elapsed / dur) * 100);
    prog.style.width = pct + '%';
    prog.style.background = _trTimer.phase === 'break' ? '#fbbf24' : '#22c55e';
  }

  if (_trTimer.state === 'stopped') lbl.textContent = remaining === 0 ? '🔔 Fim!' : 'Parado';
  else if (_trTimer.state === 'paused') lbl.textContent = 'Pausado';
  else lbl.textContent = _trTimer.phase === 'game' ? 'A jogar…' : 'Intervalo…';

  if (phase) {
    phase.textContent = _trTimer.phase === 'game' ? '⚽ Jogo' : '☕ Intervalo';
    phase.className = 'tr-timer-phase' + (_trTimer.phase === 'break' ? ' pause-phase' : '');
  }

  if (playBtn) {
    if (_trTimer.state === 'running') {
      playBtn.textContent = '⏸ Pausar';
      playBtn.className = 'btn';
      playBtn.style.cssText = 'width:100%;justify-content:center;font-size:14px;padding:11px;border-radius:10px;background:rgba(217,119,6,0.25);color:#fbbf24;border-color:rgba(217,119,6,0.5)';
    } else {
      playBtn.textContent = _trTimer.state === 'stopped' ? '▶ Iniciar' : '▶ Continuar';
      playBtn.className = 'btn btn-primary';
      playBtn.style.cssText = 'width:100%;justify-content:center;font-size:14px;padding:11px;border-radius:10px';
    }
  }

  disp.style.opacity = '1';
}

function trTimerBuzzer() {
  try {
    // Reutilizar contexto existente (criado no gesto do utilizador) — obrigatório em mobile
    if (!_trTimer.audioCtx) return;
    const ctx = _trTimer.audioCtx;
    if (ctx.state === 'suspended') ctx.resume();
    const dur = 2.0;

    // Air horn clássico: mistura de várias frequências harmónicas para som metálico/pneumático
    const freqs = [233, 311, 466, 580];
    freqs.forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      const dist = ctx.createWaveShaper();

      // Distorção para som mais áspero/metálico
      const samples = 512;
      const curve = new Float32Array(samples);
      for (let j = 0; j < samples; j++) {
        const x = (j * 2) / samples - 1;
        curve[j] = (Math.PI + 300) * x / (Math.PI + 300 * Math.abs(x));
      }
      dist.curve = curve;

      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      // Ligeira queda de frequência no fim (ar a acabar)
      osc.frequency.linearRampToValueAtTime(freq * 0.97, ctx.currentTime + dur);

      // Volume de cada harmónico (fundamental mais forte)
      const vol = [0.45, 0.30, 0.20, 0.12][i];
      gain.gain.setValueAtTime(0, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(vol, ctx.currentTime + 0.02); // ataque rápido
      gain.gain.setValueAtTime(vol, ctx.currentTime + dur - 0.15);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + dur);    // decaimento final

      osc.connect(dist);
      dist.connect(gain);
      gain.connect(ctx.destination);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + dur);
    });
  } catch(e) {}
}

function trTimerTick() {
  _trTimer.elapsed++;
  const dur = _trTimer.phase === 'game' ? _trTimer.totalGame : _trTimer.totalBreak;

  if (_trTimer.elapsed >= dur) {
    // Chegar a zero: tocar buzina e parar
    _trTimer.elapsed = dur; // fixar exatamente em 00:00
    clearInterval(_trTimer.interval);
    _trTimer.interval = null;
    _trTimer.state = 'stopped';
    trTimerBuzzer();
    trTimerUpdateUI();
    return;
  }

  trTimerUpdateUI();
}

function trTimerPlay() {
  const { game, brk } = trTimerGetDurations();
  _trTimer.totalGame  = game;
  _trTimer.totalBreak = brk;
  // Criar/retomar AudioContext dentro do gesto do utilizador — único momento permitido em mobile
  if (!_trTimer.audioCtx) {
    _trTimer.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } else if (_trTimer.audioCtx.state === 'suspended') {
    _trTimer.audioCtx.resume();
  }
  if (_trTimer.state === 'running') {
    clearInterval(_trTimer.interval);
    _trTimer.interval = null;
    _trTimer.state = 'paused';
  } else {
    _trTimer.state = 'running';
    _trTimer.phase = 'game';
    _trTimer.interval = setInterval(trTimerTick, 1000);
  }
  trTimerUpdateUI();
}

function trTimerPause() {
  const { game, brk } = trTimerGetDurations();
  _trTimer.totalGame  = game;
  _trTimer.totalBreak = brk;
  clearInterval(_trTimer.interval);
  _trTimer.interval = null;
  if (_trTimer.phase === 'break' && _trTimer.state === 'running') {
    _trTimer.state = 'stopped';
    _trTimer.elapsed = 0;
    _trTimer.phase = 'game';
  } else {
    _trTimer.phase = 'break';
    _trTimer.elapsed = 0;
    _trTimer.state = 'running';
    _trTimer.interval = setInterval(trTimerTick, 1000);
  }
  trTimerUpdateUI();
}

function trTimerReset() {
  clearInterval(_trTimer.interval);
  _trTimer.interval = null;
  _trTimer.state = 'stopped';
  _trTimer.phase = 'game';
  _trTimer.elapsed = 0;
  const { game, brk } = trTimerGetDurations();
  _trTimer.totalGame  = game;
  _trTimer.totalBreak = brk;
  trTimerUpdateUI();
}

// ── Init torneios ────────────────────────────────────────────
trLoad();

// Arrancar pelo ecrã inicial (splash) — o clique no centro decide login vs painel
renderSplash();
</script>
