// === PAINEL ===
function getAllModalidadesCountsBySem(){
  // Devolve { mod: { s1: N, s2: N } } — fonte: campo modalidadeSumario do separador Sumários
  const c={};
  Object.values(S.sumarios).forEach(s=>{
    if(!s.sumario||!s.modalidadeSumario) return;
    const sem=parseInt(s.semestre)||1;
    const mod=s.modalidadeSumario;
    if(!c[mod]) c[mod]={s1:0,s2:0};
    if(sem===1) c[mod].s1++; else c[mod].s2++;
  });
  return c;
}


// ═══════════════════════════════════════════════════════
// AVISOS — cálculo centralizado
// ═══════════════════════════════════════════════════════
function calcAvisos(incluirLidos=false){
  const avisos=[];
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const hojeStr=hoje.toISOString().slice(0,10);
  const limite=5; // fixo: aviso a partir da 6ª falta (>5)
  const lidos=S.avisosLidos||{};

  function makeId(chave){ return btoa(unescape(encodeURIComponent(chave))); }

  // 1. FALTAS EM EXCESSO
  S.turmas.forEach(turma=>{
    const nomes=turma.alunos.map(a=>typeof a==='string'?a:a.nome);
    const contagem={};
    nomes.forEach(n=>{ contagem[n]=0; });
    Object.values(S.faltas||{}).forEach(registo=>{
      Object.entries(registo).forEach(([nome,tipo])=>{
        if(tipo==='fp'&&contagem[nome]!==undefined) contagem[nome]++;
      });
    });
    nomes.forEach(nome=>{
      if(contagem[nome]>limite){
        const id=makeId('faltas|'+turma.id+'|'+nome);
        avisos.push({
          id,
          tipo:'faltas',
          nivel:'erro',
          titulo:'Excesso de Faltas',
          data: lidos[id+'__data']||hojeStr,
          msg:`${nome} (${turma.nome}) — ${contagem[nome]} falta${contagem[nome]!==1?'s':''} (limite: >${limite})`
        });
      }
    });
  });

  // 2. REUNIÕES NAS PRÓXIMAS 48H
  const em48h=new Date(hoje); em48h.setHours(47,59,59,999);
  (S.reunioes||[]).forEach(r=>{
    if(!r.data) return;
    const dr=new Date(r.data); dr.setHours(0,0,0,0);
    if(dr>=hoje && dr<=em48h && r.status!=='Realizada' && r.status!=='Cancelada'){
      const dias=Math.round((dr-hoje)/(1000*60*60*24));
      const id=makeId('reuniao|'+r.id);
      avisos.push({
        id,
        tipo:'reuniao',
        nivel:'aviso',
        titulo:'Reunião Próxima',
        data: lidos[id+'__data']||hojeStr,
        msg:`${r.titulo||r.subtipo||'Reunião'} — ${r.data}${r.hora?' às '+r.hora:''}${dias===0?' (hoje)':' (amanhã)'}`
      });
    }
  });

  // 3. ALUNOS POR AVALIAR — um aviso por coluna (turma + semestre + campo)
  S.turmas.forEach(turma=>{
    const nomes=turma.alunos.map(a=>typeof a==='string'?a:a.nome);
    if(!nomes.length) return;
    ['aid','sem1','sem2'].forEach(sub=>{
      const key=`${turma.id}__${sub}`;
      const d=S.avaliacao?.[key];
      if(!d) return;
      const subLabel={aid:'AID',sem1:'1º Semestre',sem2:'2º Semestre'}[sub];

      // Nota do professor — só avisa se já existe pelo menos 1 nota numérica válida lançada
      if(d.notaProfessor){
        const comNota=nomes.filter(n=>d.notaProfessor[n]!==undefined&&d.notaProfessor[n]!==''&&!isNaN(parseFloat(d.notaProfessor[n])));
        const semNota=nomes.filter(n=>d.notaProfessor[n]===undefined||d.notaProfessor[n]===''||isNaN(parseFloat(d.notaProfessor[n])));
        if(comNota.length>=1&&semNota.length>=1){
          const id=makeId('aval|'+turma.id+'|'+sub+'|notaProf');
          avisos.push({id,tipo:'avaliacao',nivel:'aviso',titulo:'Avaliação Incompleta',
            data:lidos[id+'__data']||hojeStr,
            msg:`${turma.nome} · ${subLabel} · Nota do Professor — ${semNota.length} aluno${semNota.length!==1?'s':''} por avaliar (${semNota.slice(0,3).join(', ')}${semNota.length>3?'…':''})`});
        }
      }

      // Atividades — um aviso independente por coluna com título preenchido
      // Só gera aviso se o preenchimento já foi INICIADO (≥1 aluno com nota numérica válida)
      if(d.ativNotas&&d.atividadesTitulos){
        for(let ci=0;ci<14;ci++){
          const titulo=d.atividadesTitulos[ci];
          if(!titulo) continue;
          // "Com nota" = valor numérico (string não vazia e parseFloat válido)
          const comNota=nomes.filter(n=>{
            const v=(d.ativNotas[n]||[])[ci];
            return v!==undefined&&v!==''&&v!==null&&!isNaN(parseFloat(v));
          });
          const semNota=nomes.filter(n=>{
            const v=(d.ativNotas[n]||[])[ci];
            return v===undefined||v===''||v===null||isNaN(parseFloat(v));
          });
          // Só avisa se já existe pelo menos 1 nota lançada E falta pelo menos 1
          if(comNota.length>=1&&semNota.length>=1){
            const id=makeId('aval|'+turma.id+'|'+sub+'|ativ|'+ci);
            avisos.push({id,tipo:'avaliacao',nivel:'aviso',titulo:'Avaliação Incompleta',
              data:lidos[id+'__data']||hojeStr,
              msg:`${turma.nome} · ${subLabel} · ${titulo} — ${semNota.length} aluno${semNota.length!==1?'s':''} por avaliar (${semNota.slice(0,3).join(', ')}${semNota.length>3?'…':''})`});
          }
        }
      }

      // Autoavaliação — só avisa se já existe pelo menos 1 valor numérico válido lançado
      if(d.autoAvaliacao){
        const comNota=nomes.filter(n=>d.autoAvaliacao[n]!==undefined&&d.autoAvaliacao[n]!==''&&!isNaN(parseFloat(d.autoAvaliacao[n])));
        const semNota=nomes.filter(n=>d.autoAvaliacao[n]===undefined||d.autoAvaliacao[n]===''||isNaN(parseFloat(d.autoAvaliacao[n])));
        if(comNota.length>=1&&semNota.length>=1){
          const id=makeId('aval|'+turma.id+'|'+sub+'|autoAval');
          avisos.push({id,tipo:'avaliacao',nivel:'aviso',titulo:'Avaliação Incompleta',
            data:lidos[id+'__data']||hojeStr,
            msg:`${turma.nome} · ${subLabel} · Autoavaliação — ${semNota.length} aluno${semNota.length!==1?'s':''} por preencher (${semNota.slice(0,3).join(', ')}${semNota.length>3?'…':''})`});
        }
      }
    });
  });

  // Filtrar eliminados (sempre — avisos eliminados nunca voltam)
  const eliminados=S.avisosEliminados||{};
  const semEliminados=avisos.filter(a=>!eliminados[a.id]);
  // Filtrar lidos (salvo se incluirLidos=true)
  return incluirLidos ? semEliminados : semEliminados.filter(a=>!lidos[a.id]);
}

function notaColor(n){
  if(n===null||n===undefined||n==='—') return '#94a3b8';
  const v=parseInt(n);
  if(isNaN(v)) return '#94a3b8';
  if(v>=18) return '#16a34a';
  if(v>=14) return '#2563eb';
  if(v>=10) return '#d97706';
  return '#dc2626';
}

function notaBg(n){
  if(n===null||n===undefined||n==='—') return 'transparent';
  const v=parseInt(n);
  if(isNaN(v)) return 'transparent';
  if(v>=18) return '#f0fdf4';
  if(v>=14) return '#eff6ff';
  if(v>=10) return '#fffbeb';
  return '#fef2f2';
}

function renderResumoAnual(){
  if(!S.turmas||!S.turmas.length) return '';

  const cols = S.turmas.map(t=>{
    const k1=`${t.id}__sem1`, k2=`${t.id}__sem2`;
    const notas1=S.avaliacao?.[k1]?.classifFinalSem||{};
    const notas2=S.avaliacao?.[k2]?.classifFinalSem||{};
    const alunos=(t.alunos||[]).map(a=>typeof a==='string'?a:(a.nome||'')).filter(Boolean);

    // Médias da turma
    const vals1=alunos.map(n=>parseFloat(notas1[n])).filter(v=>!isNaN(v)&&v>0);
    const vals2=alunos.map(n=>parseFloat(notas2[n])).filter(v=>!isNaN(v)&&v>0);
    const med1=vals1.length?Math.round(vals1.reduce((a,b)=>a+b,0)/vals1.length*10)/10:null;
    const med2=vals2.length?Math.round(vals2.reduce((a,b)=>a+b,0)/vals2.length*10)/10:null;

    return {t, alunos, notas1, notas2, med1, med2};
  });

  const nTurmas = cols.length;
  const maxAlunos = cols.reduce((m,c)=>Math.max(m,c.alunos.length),0);

  // Cabeçalho — uma célula por turma (colspan 3: nome | 1S | 2S), mais espaçador entre turmas
  const theadCols = cols.map(({t,alunos})=>`
    <th colspan="2" style="padding:3px 2px;text-align:center;font-size:10px;color:#cbd5e1;font-weight:600;background:#1e3a5f;border-left:3px solid #0f172a">1S</th>
    <th style="padding:3px 2px;text-align:center;font-size:10px;color:#cbd5e1;font-weight:600;background:#1e3a5f">2S</th>
  `).join('');

  const theadNames = cols.map(({t,alunos})=>`
    <th colspan="3" style="padding:5px 6px;text-align:center;background:var(--blue);color:#fff;font-size:11px;font-weight:800;border-left:3px solid #0f172a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0">
      ${esc(t.nome)} <span style="font-weight:400;opacity:0.75;font-size:10px">(${alunos.length} al.)</span>
    </th>
  `).join('');

  // Linhas de dados — para cada linha i até maxAlunos
  const tbodyRows = Array.from({length: maxAlunos}, (_,i)=>{
    const bg = i%2===0?'var(--gray2)':'#fff';
    const cells = cols.map(({alunos,notas1,notas2})=>{
      const nome = alunos[i];
      if(!nome) return `<td colspan="3" style="padding:3px 5px;background:${bg};border-bottom:1px solid var(--border);border-left:3px solid #e2e8f0"></td>`;
      const n1=notas1[nome]; const n2=notas2[nome];
      const v1=n1!==undefined&&n1!==''&&n1!==null?n1:'—';
      const v2=n2!==undefined&&n2!==''&&n2!==null?n2:'—';
      return `
        <td style="padding:3px 5px;font-size:11px;color:var(--navy);border-bottom:1px solid var(--border);background:${bg};border-left:3px solid #e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0">${esc(nome)}</td>
        <td style="padding:3px 4px;text-align:center;font-size:11px;font-weight:700;color:${notaColor(v1)};background:${notaBg(v1)};border-bottom:1px solid var(--border);white-space:nowrap">${v1}</td>
        <td style="padding:3px 4px;text-align:center;font-size:11px;font-weight:700;color:${notaColor(v2)};background:${notaBg(v2)};border-bottom:1px solid var(--border);white-space:nowrap">${v2}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');

  // Linha de Médias
  const tfootCells = cols.map(({med1,med2})=>`
    <td style="padding:3px 5px;font-size:10px;font-weight:700;color:#0369a1;background:#e0f2fe;border-left:3px solid #0f172a;white-space:nowrap">Média</td>
    <td style="padding:3px 2px;text-align:center;font-size:11px;font-weight:800;color:${notaColor(med1)};background:#e0f2fe">${med1!==null?med1:'—'}</td>
    <td style="padding:3px 2px;text-align:center;font-size:11px;font-weight:800;color:${notaColor(med2)};background:#e0f2fe">${med2!==null?med2:'—'}</td>
  `).join('');

  return `<div class="card" style="margin-bottom:20px">
    <div style="font-size:14px;font-weight:800;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      📋 Avaliação — Resumo Anual Comparativo
      <span style="font-size:11px;font-weight:500;color:var(--gray);background:var(--gray2);padding:2px 8px;border-radius:12px">Notas finais por turma</span>
    </div>
    <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:6px">
      <table style="border-collapse:collapse;width:100%;table-layout:fixed;min-width:${nTurmas*160}px">
        <thead>
          <tr>${theadNames}</tr>
          <tr>${theadCols}</tr>
        </thead>
        <tbody>${tbodyRows}</tbody>
        <tfoot><tr>${tfootCells}</tr></tfoot>
      </table>
    </div>
    <div style="margin-top:10px;display:flex;gap:12px;flex-wrap:wrap">
      ${[{c:'#f0fdf4',tc:'#16a34a',l:'≥ 18'},
         {c:'#eff6ff',tc:'#2563eb',l:'14–17'},
         {c:'#fffbeb',tc:'#d97706',l:'10–13'},
         {c:'#fef2f2',tc:'#dc2626',l:'< 10'}
        ].map(x=>`<div style="display:flex;align-items:center;gap:5px">
          <div style="width:14px;height:14px;border-radius:3px;background:${x.c};border:1px solid ${x.tc}44"></div>
          <span style="font-size:11px;color:var(--gray)">${x.l}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderPainel(){
  const modsBySem=getAllModalidadesCountsBySem();
  // Total de aulas dadas = sumários com sumário E modalidadeSumario preenchidos (mesma fonte da planificação)
  const totalAulas=Object.values(S.sumarios).filter(v=>v.sumario&&v.modalidadeSumario).length;
  const totalS1=Object.values(modsBySem).reduce((s,v)=>s+v.s1,0);
  const totalS2=Object.values(modsBySem).reduce((s,v)=>s+v.s2,0);
  const totalTurmas=S.turmas.length;
  const totalAlunos=S.turmas.reduce((s,t)=>s+t.alunos.length,0);
  const totalPrevistas=S.turmas.reduce((s,t)=>{const p=getAulasPrevistas(t.id);return s+p.s1+p.s2;},0);

  function renderModGrid(entries, totalSem, color, colorBg){
    if(!entries.length) return `<div style="font-size:12px;color:var(--gray);padding:8px 0;font-style:italic">Sem aulas registadas</div>`;
    return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px">
      ${entries.map(([mod,count])=>{
        const pct=totalSem>0?Math.round(count/totalSem*100):0;
        return `<div style="background:${colorBg};border-radius:8px;padding:10px 12px">
          <div style="font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px">${esc(mod)}</div>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="flex:1;height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden">
              <div style="height:100%;width:${pct}%;background:${color};border-radius:3px"></div>
            </div>
            <span style="font-size:13px;font-weight:700;color:${color};min-width:20px;text-align:right">${count}</span>
          </div>
          <div style="font-size:10px;color:var(--gray);margin-top:3px">${count} aula${count!==1?'s':''} · ${pct}%</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  const s1Entries=Object.entries(modsBySem).filter(([,v])=>v.s1>0).map(([m,v])=>[m,v.s1]).sort((a,b)=>b[1]-a[1]);
  const s2Entries=Object.entries(modsBySem).filter(([,v])=>v.s2>0).map(([m,v])=>[m,v.s2]).sort((a,b)=>b[1]-a[1]);
  const hasMods=s1Entries.length||s2Entries.length;

  const modSection=hasMods?`
    <div class="card" style="margin-bottom:20px">
      <div style="font-size:14px;font-weight:700;color:var(--navy);margin-bottom:16px">📊 Modalidades Lecionadas</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="background:#dbeafe;color:#1d4ed8;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">1º SEMESTRE</span>
            <span style="font-size:11px;color:var(--gray)">${totalS1} aula${totalS1!==1?'s':''}</span>
          </div>
          ${renderModGrid(s1Entries,totalS1,'#2563eb','#eff6ff')}
        </div>
        <div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
            <span style="background:#dcfce7;color:#16a34a;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">2º SEMESTRE</span>
            <span style="font-size:11px;color:var(--gray)">${totalS2} aula${totalS2!==1?'s':''}</span>
          </div>
          ${renderModGrid(s2Entries,totalS2,'#16a34a','#f0fdf4')}
        </div>
      </div>
    </div>`
  :`<div class="card" style="margin-bottom:20px;text-align:center;color:var(--gray);font-size:13px;padding:32px">
      Ainda não há modalidades registadas. Insira modalidades no Plano Semanal e adicione sumários.
    </div>`;

  const _avisos=calcAvisos();
  const _nAvisos=_avisos.length;
  const _btnStyle=_nAvisos>0
    ? 'background:#dc2626;color:#fff;border-color:#dc2626;animation:pisca-aviso 1s ease-in-out infinite'
    : 'background:var(--gray2);color:var(--gray);border-color:var(--border)';

  return `<div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin:0">Painel Principal — ${esc(S.anoLetivo)}</div>
      <div style="display:flex;align-items:center;gap:10px">
      <button class="btn btn-primary" id="openCfgBtn" style="display:inline-flex;align-items:center">⚙️ Configurações da Escola</button>
      <button class="btn" id="avisosBtn" style="${_btnStyle};position:relative;font-weight:700;font-size:15px;padding:10px 20px;border-radius:10px;letter-spacing:0.2px;display:${isMobile()?'none':'inline-flex'};align-items:center">
        🔔 Avisos${_nAvisos>0?` <span style="background:#fff;color:#dc2626;border-radius:50%;min-width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-left:6px;padding:0 4px">${_nAvisos}</span>`:''}
      </button>

    <div class="grid-4" style="margin-bottom:20px">

        <div style="font-size:28px;font-weight:700;color:${s.c}">${s.v}</div>
      </div>`).join('')}
    </div>
    ${modSection}
    ${renderResumoAnual()}
  </div>`;
}

      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="font-size:12px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.6px;white-space:nowrap">📂 Avisos Lidos / Resolvidos (${avisosLidosLista.length})</span>

      ${avisosLidosLista.map(a=>`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">

function calcSucessoTurma(t){
  const basico=['7º','8º','9º'].includes(t.ano);
  const nAlunos=t.alunos.length;
  if(!nAlunos) return null;

  function getNotaFinal(nome, semKey){
    const d=S.avaliacao?.[`${t.id}__${semKey}`];
    if(!d) return null;
    if(basico){
      // básico: nota do professor (0-5 notação percentagem) ou classifFinalSem
      const cf=d.classifFinalSem?.[nome];
      if(cf!==undefined&&cf!=='') return parseFloat(cf);
      return null;
    } else {
      // secundário: classifFinalSem (0-20)
      const cf=d.classifFinalSem?.[nome];
      if(cf!==undefined&&cf!=='') return parseFloat(cf);
      return null;
    }
  }

  function calcSem(semKey){
    const notas=t.alunos.map(a=>getNotaFinal(typeof a==='string'?a:a.nome, semKey)).filter(v=>v!==null&&!isNaN(v));
    const total=notas.length;
    if(!total) return null;
    const limiar=basico?3:10;
    const sucesso=notas.filter(v=>v>=limiar).length;
    const taxaSucesso=Math.round(sucesso/total*100);
    const qual={};
    if(basico){
      [5,4,3,2,1].forEach(n=>{ qual[n]=notas.filter(v=>Math.round(v)===n).length; });
    } else {
      ['>18a20','14a17','10a13','8a9','<8'].forEach(k=>{ qual[k]=0; });
      notas.forEach(v=>{
        if(v>=18) qual['>18a20']++;
        else if(v>=14) qual['14a17']++;
        else if(v>=10) qual['10a13']++;
        else if(v>=8)  qual['8a9']++;
        else           qual['<8']++;
      });
    }
    return {taxaSucesso, qual, total};
  }

  return {s1:calcSem('sem1'), s2:calcSem('sem2'), basico};
}

function renderTurmaCard(t){
  const aulas=getAulasDadasPlanificacao(t.id);
  const prev=getAulasPrevistas(t.id);
  const modsBySem=getModalidadesCountsBySem(t.id);
  const s1Entries=Object.entries(modsBySem).filter(([,v])=>v.s1>0).map(([m,v])=>[m,v.s1]).sort((a,b)=>b[1]-a[1]);
  const s2Entries=Object.entries(modsBySem).filter(([,v])=>v.s2>0).map(([m,v])=>[m,v.s2]).sort((a,b)=>b[1]-a[1]);
  const hasMods=s1Entries.length||s2Entries.length;

  function semBadges(entries, colorClass){
    return entries.map(([m,c])=>`<span class="badge ${colorClass}">${m} <strong>${c}</strong></span>`).join('');
  }

  const modsHtml=hasMods?`
    <div style="margin-top:10px">
      ${s1Entries.length?`<div style="margin-bottom:6px">
        <div style="font-size:10px;font-weight:700;color:#1d4ed8;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px">1º Semestre</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px">${semBadges(s1Entries,'badge-blue')}</div>
      </div>`:''}
      ${s2Entries.length?`<div>
        <div style="font-size:10px;font-weight:700;color:#16a34a;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px">2º Semestre</div>
        <div style="display:flex;flex-wrap:wrap;gap:3px">${semBadges(s2Entries,'badge-green')}</div>
      </div>`:''}
    </div>`:'';

  return `<div class="turma-card">
    <div class="turma-header">
      <span class="turma-nome">${esc(t.nome)}</span>
      <span class="turma-ano">${t.ano}</span>
    </div>
    <div class="turma-body">
      <div class="turma-stat"><span class="stat-label">Alunos</span><span class="stat-val">${t.alunos.length}</span></div>
      <table class="mini-table">
        <tr><th></th><th>1ºS</th><th>2ºS</th><th>Total</th></tr>
        <tr><td>Previstas</td><td>${prev.s1}</td><td>${prev.s2}</td><td><strong>${prev.s1+prev.s2}</strong></td></tr>
        <tr><td>Dadas</td><td><span style="color:var(--green);font-weight:600">${aulas.s1}</span></td><td><span style="color:var(--green);font-weight:600">${aulas.s2}</span></td><td><strong style="color:var(--green)">${aulas.s1+aulas.s2}</strong></td></tr>
      </table>
      ${modsHtml}

        <button class="btn btn-sm btn-danger" data-delturma="${t.id}">🗑️</button>
      </div>
    </div>
  </div>`;
}

  const buildColHeaderRow = () => colDefs.map(c=>c.h);

  // ── Montar wsData (array of arrays) ───────────────────────────────────────
  const headerRow1 = buildGroupHeaderRow();
  const headerRow2 = buildSubGroupRow();
  const headerRow3 = buildColHeaderRow();

  // ── Dados por aluno ────────────────────────────────────────────────────────
  const dataRows = turma.alunos.map((a, i) => {
    const nome    = typeof a==='string' ? a : a.nome;
    const num     = typeof a==='object' && a.num ? a.num : i+1;
    const genero  = (typeof a==='object' ? a.genero||'' : '').toUpperCase();
    const dataNasc= typeof a==='object' ? a.dataNasc||'' : '';
    const idadeNum= calcIdade(dataNasc, anoLetivo);
    const idadeClamp = idadeNum===null ? null : Math.max(9,Math.min(18,idadeNum));

    // Aptidão Física 1ºS
    const fitKey1s   = `${turma.id}__fitescola1s`;

    const ref1 = (genero==='M'||genero==='F') ? (FITESCOLA_TB[genero]?.[idadeClamp]||FITESCOLA_TB[genero]?.[15]||null) : null;
    const res1 = fitDados1s.resultados?.[nome]||{};
    let nPM1=0,nOK1=0,nAtl1=0;
    if(ref1){ FITESCOLA_TESTES.forEach(t=>{ const ev=fitEval(res1[t.id]??'',ref1[t.id],t.higher,t.id==='milha'); if(ev.badge==='pm')nPM1++; else if(ev.badge==='ok')nOK1++; else if(ev.badge==='atl')nAtl1++; }); }
    const autoFit1 = Math.min(5, nAtl1*1+nOK1*0.5);
    const ovFit1   = parseFloat(dados.fitPontosOverride?.[nome]??'');
    const p1       = isNaN(ovFit1) ? autoFit1 : ovFit1;

    // Aptidão Física 2ºS
    let nPM2=0,nOK2=0,nAtl2=0,p2=0,pMedia='';

      const res2 = fitDados2s.resultados?.[nome]||{};
      if(ref2){ FITESCOLA_TESTES.forEach(t=>{ const ev=fitEval(res2[t.id]??'',ref2[t.id],t.higher,t.id==='milha'); if(ev.badge==='pm')nPM2++; else if(ev.badge==='ok')nOK2++; else if(ev.badge==='atl')nAtl2++; }); }
      const autoFit2 = Math.min(5, nAtl2*1+nOK2*0.5);
      const ovFit2   = parseFloat(dados.fitPontos2sOverride?.[nome]??'');
      p2 = isNaN(ovFit2) ? autoFit2 : ovFit2;
      if(p1||p2) pMedia = Math.round(((p1||0)+(p2||0))/2*100)/100;
    }

    // Atividades Físicas
    const ativNotas = dados.ativNotas?.[nome] || Array(14).fill('');
    const vCols1a4x=ativNotas.map((v,i)=>i<4?parseFloat(v)||0:0).filter(v=>v>0).sort((a,b)=>b-a);
    const vCol5Ginx=parseFloat(ativNotas[4])||0;
    const vCol6Dancax=parseFloat(ativNotas[5])||0;
    const vCols6a14x=ativNotas.slice(5,14).map(v=>parseFloat(v)||0).filter(v=>v>0).sort((a,b)=>b-a);
    let mAll;
    if(isSem2){
      const ano=turma.ano;
      if(ano==='7º'){
        mAll=[(vCols1a4x[0]||0),vCol5Ginx,(vCols6a14x[0]||0),(vCols6a14x[1]||0),(vCols6a14x[2]||0),0];
      } else if(ano==='8º'){
        mAll=[(vCols1a4x[0]||0),vCol5Ginx,(vCols6a14x[0]||0),(vCols6a14x[1]||0),(vCols6a14x[2]||0),(vCols6a14x[3]||0)];
      } else if(ano==='9º'){
        mAll=[(vCols1a4x[0]||0),(vCols1a4x[1]||0),vCol5Ginx,vCol6Dancax,(vCols6a14x[0]||0),(vCols6a14x[1]||0)];
      } else {
        mAll=[(vCols1a4x[0]||0),(vCols1a4x[1]||0),vCol5Ginx,vCol6Dancax,(vCols6a14x[0]||0),(vCols6a14x[1]||0)];
      }
    } else {
      const vals = ativNotas.map(v=>parseFloat(v)||0).filter(v=>v>0).sort((a,b)=>b-a);
      mAll = [vals[0]||0,vals[1]||0,vals[2]||0,vals[3]||0,vals[4]||0,vals[5]||0];
    }
    const mUsed = mAll.slice(0, nMelhores);
    const total = Math.round(mUsed.reduce((s,v)=>s+v,0)*10)/10;
    const pontosAtiv = Math.min(maxPtsAtiv, total);

    // Conhecimentos
    const conhecClassif1s = dados.conhecClassif?.[nome]??'';
    const conhecClassif2s = isSem2 ? (dados.conhecClassif2s?.[nome]??'') : '';
    let mediaConhec = '';
    if(isSem2){
      const v1=conhecClassif1s!==''?parseFloat(conhecClassif1s):null;
      const v2=conhecClassif2s!==''?parseFloat(conhecClassif2s):null;
      if(v1!==null||v2!==null){ const cnt=[v1,v2].filter(v=>v!==null).length; mediaConhec=Math.round(((v1||0)+(v2||0))/cnt*10)/10; }
    }
    const conhecPontos = isSem2
      ? calcConhPontos(mediaConhec!==''?String(mediaConhec):'', turma.ano)
      : calcConhPontos(conhecClassif1s, turma.ano);

    // Total Pontos 85%
    const fitVal = isSem2 ? (pMedia||0) : (p1||0);
    const totalPontos = (fitVal||pontosAtiv||conhecPontos!=='')
      ? Math.round((fitVal + pontosAtiv + (conhecPontos===''?0:conhecPontos))*100)/100 : '';
    const notaPrevista = totalPontos!=='' ? calcClassFinal(totalPontos, turma.ano, subStr) : '';
    const notaProf = basico ? (dados.notaProfessor?.[nome]||'') : notaPrevista;

    // Atitudes e Valores
    const perc1s = calcPercAulasRealizadas(turma.id, nome, 1);
    const perc2s = isSem2 ? calcPercAulasRealizadas(turma.id, nome, 2) : '';
    const r1 = parseFloat(sem1Dados.atitResponsab?.[nome])||0;
    const e1 = parseFloat(sem1Dados.atitExigencia?.[nome])||0;
    const cl1 = (r1||e1) ? Math.round((r1+e1)*10)/10 : '';
    const r2 = isSem2 ? parseFloat(dados.atitResponsab2s?.[nome])||0 : parseFloat(dados.atitResponsab?.[nome])||0;
    const e2 = isSem2 ? parseFloat(dados.atitExigencia2s?.[nome])||0 : parseFloat(dados.atitExigencia?.[nome])||0;
    const cl2 = (r2||e2) ? Math.round((r2+e2)*10)/10 : '';
    let atitFinal;
    if(isSem2){
      const c1v=cl1!==''?cl1:null, c2v=cl2!==''?cl2:null;
      const cnt=[c1v,c2v].filter(v=>v!==null).length;
      atitFinal = cnt>0 ? Math.round(((c1v||0)+(c2v||0))/cnt*10)/10 : '';
    } else { atitFinal = cl2; }

    // Classificação Final
    const notaProfNum = parseFloat(notaProf);
    const atitNum     = parseFloat(atitFinal)||0;
    const mediaFinal  = (!isNaN(notaProfNum)&&atitNum) ? Math.round((notaProfNum*0.85+atitNum*0.15)*10)/10 : '';
    const autoAval    = dados.autoAvaliacao?.[nome]||'';
    const classifFinal= dados.classifFinalSem?.[nome]||'';

    // Montar linha
    const row = [num, nome];
    if(isSem2){ row.push(nPM1||'',nOK1||'',nAtl1||'',p1, nPM2||'',nOK2||'',nAtl2||'',p2, pMedia||''); }
    else       { row.push(nPM1||'',nOK1||'',nAtl1||'',p1); }
    for(let ci=0;ci<14;ci++) row.push(ativNotas[ci]??'');
    for(let mi=0;mi<nMelhores;mi++) row.push(mUsed[mi]||'');
    row.push(total||'', pontosAtiv||'');
    if(isSem2){ row.push(conhecClassif1s, conhecClassif2s, mediaConhec, conhecPontos); }
    else       { row.push(conhecClassif1s, conhecPontos); }
    row.push(totalPontos, notaPrevista, notaProf);
    if(isSem2){ row.push(perc1s, r1||'',e1||'',cl1, perc2s, r2||'',e2||'',cl2, atitFinal); }
    else       { row.push(perc1s, r2||'',e2||'',atitFinal); }
    row.push(mediaFinal, autoAval, classifFinal);
    return row;
  });

  // ── Montar workbook com estilos ────────────────────────────────────────────
  const ws = {};
  const range = {s:{r:0,c:0}, e:{r:2+dataRows.length, c:nCols-1}};

  // Linha 1 — grupos principais
  const H1_COLORS = {

    cfblock: {bg:'#FFF1F2', font:'E11D48'},

  // Mapear colunas → blocos para linha 1
  const afStartC  = 2;
  const afEndC    = isSem2 ? 10 : 5;

  const ativEndC  = ativStartC + 11;
  const resumoStartC = ativEndC + 1;
  const resumoEndC   = resumoStartC + nMelhores + 1;
  const conhecStartC = resumoEndC + 1;
  const conhecEndC   = isSem2 ? conhecStartC + 3 : conhecStartC + 1;
  const totalStartC  = conhecEndC + 1;
  const notaEndC     = totalStartC + 2;
  const atitStartC   = notaEndC + 1;
  const atitEndC     = isSem2 ? atitStartC + 8 : atitStartC + 3;

  function setCell(r, c, v, style){
    const addr = XLSX.utils.encode_cell({r,c});
    ws[addr] = {v: v===null||v===undefined?'':v, t: typeof v==='number'?'n':'s', s: style};
  }

  // Linha 0 (grupos principais)
  for(let c=0;c<nCols;c++){
    let v='', bg='#1A2D4A', font='FFFFFF';

  for(let c=0;c<nCols;c++){

    else if(c>=afStartC&&c<=afEndC){
      if(isSem2){
        if(c<afStartC+4){ v=(c===afStartC?'APTIDÃO FÍSICA\n1º SEMESTRE':''); bg='#1E3A5F'; font='A5D8FF'; }

      } else {

    else if(c>=conhecStartC&&c<=conhecEndC){
      if(isSem2){
        if(c<conhecStartC+2){ v=(c===conhecStartC?'CONHECIMENTOS\n(Class. 1ºS)':''); bg='#92400E'; font='FEF3C7'; }
        else if(c===conhecStartC+2){ v='CONHECIMENTOS\n(Class. 2ºS)'; bg='#78350F'; font='FEF3C7'; }

      } else {

    }
    else if(c===totalStartC){ v='TOTAL PONTOS\nConhec. e Capacidades'; bg='#0F4C3A'; font='A7F3D0'; }
    else if(c===totalStartC+1||c===totalStartC+2){ v=(c===totalStartC+1?'Class. Final Domínio\nConhec. e Capacidades':''); bg='#155E75'; font='A5F3FC'; }
    else if(c>=atitStartC&&c<=atitEndC){
      if(isSem2){
        if(c<atitStartC+4){ v=(c===atitStartC?'ATITUDES E VALORES\n1º SEMESTRE':''); bg='#78350F'; font='FDE68A'; }
        else if(c<atitStartC+8){ v=(c===atitStartC+4?'ATITUDES E VALORES\n2º SEMESTRE':''); bg='#6B2D0A'; font='FDE68A'; }
        else{ v='Class. Final\nAtitudes (15%)'; bg='#431407'; font='FFFFFF'; }
      } else {
        v=(c===atitStartC?'ATITUDES E VALORES — 15%':''); bg='#78350F'; font='FDE68A';
      }
    }
    else if(c>=cfStartC){ v=''; bg='#FFF1F2'; font='E11D48'; }
    setCell(1,c,v,cellStyle(bg,true,font,'center',10));
  }

  // Linha 2 (cabeçalhos individuais das colunas)
  for(let c=0;c<nCols;c++){
    const def = colDefs[c];
    const gc  = GROUP_COLORS[def.g]||{bg:'#243757',font:'FFFFFF'};
    const fnt = def.fontColor||gc.font;
    setCell(2,c,def.h,cellStyle(gc.bg,true,fnt,'center',10));
  }

  // Linhas de dados
  const altColors = ['#F8FAFC','#FFFFFF'];
  // Cores para grupos de colunas nas linhas de dados
  const COL_DATA_BG = {
    id:       null,  // alternante
    af1s:     null,
    af2s:     '#EFF6FF',
    afmed:    '#F0FDF4',
    ativ:     '#F0FDF4',
    resumo:   '#F5F3FF',
    conh:     '#FEF9F0',
    conh2s:   '#FEF3C7',
    conhmed:  '#FDE68A',
    total:    null,  // override por col
    notaprev: null,
    notaprof: null,
    atit1s:   '#FEF9F0',
    atit2s:   '#FEF3C7',
    atitfinal:null,
    cfinal:   '#FFF1F2',
    cfinalv:  '#FFE4E6',
  };
  const COL_OVERRIDE_BG = {}; // col index → hex
  // Colunas com fundo específico na app
  const totalIdx   = conhecEndC + 1;
  const prevIdx    = totalIdx  + 1;
  const profIdx    = totalIdx  + 2;
  COL_OVERRIDE_BG[totalIdx] = '#0F4C3A';  // total pontos verde escuro
  COL_OVERRIDE_BG[prevIdx]  = '#0E7490';  // nota prevista azul
  if(basico) COL_OVERRIDE_BG[profIdx] = null; // editável, fundo neutro
  else       COL_OVERRIDE_BG[profIdx] = '#0E7490';
  if(isSem2) COL_OVERRIDE_BG[atitEndC] = '#431407';
  COL_OVERRIDE_BG[cfEndC-1] = '#F0FDF4'; // auto-avaliação
  COL_OVERRIDE_BG[cfEndC]   = '#FFE4E6'; // class. final

  dataRows.forEach((row, ri)=>{
    const rowBg = altColors[ri%2];
    row.forEach((val, c)=>{
      const def = colDefs[c];
      let bg = COL_DATA_BG[def.g];
      if(bg===null||bg===undefined) bg = rowBg;
      if(COL_OVERRIDE_BG[c]!==undefined && COL_OVERRIDE_BG[c]!==null) bg = COL_OVERRIDE_BG[c];

      // Cor de fonte consoante o fundo
      let fontCol = '1A2332', bold=false, fsz=11;
      const darkBgs = ['#0F4C3A','#0E7490','#431407','#78350F','#6B2D0A','#163A2A','#155E75'];
      if(darkBgs.includes(bg)){ fontCol='FFFFFF'; bold=true; fsz=13; }
      if(c===COL_NOME) { // nome alinhado à esquerda
        const addr=XLSX.utils.encode_cell({r:3+ri,c});
        ws[addr]={v:val===null||val===undefined?'':val,t:'s',s:{
          fill:{patternType:'solid',fgColor:{rgb:'FF'+bg.replace('#','').toUpperCase()}},
          font:{bold:false,color:{rgb:'FF1A2332'},sz:11},
          alignment:{horizontal:'left',vertical:'center'},
          border:{top:{style:'thin',color:{rgb:'FFD1D5DB'}},bottom:{style:'thin',color:{rgb:'FFD1D5DB'}},left:{style:'thin',color:{rgb:'FFD1D5DB'}},right:{style:'thin',color:{rgb:'FFD1D5DB'}}}
        }};
        return;
      }
      const numVal = val!==''&&val!==null&&val!==undefined ? (isNaN(Number(val))?null:Number(val)) : null;
      const addr=XLSX.utils.encode_cell({r:3+ri,c});
      ws[addr]={
        v: numVal!==null ? numVal : (val===null||val===undefined?'':String(val)),
        t: numVal!==null ? 'n' : 's',
        s: dataStyle(bg, fontCol, bold, fsz)
      };
    });
  });

  // Merges: linha 0 e linha 1 para cabeçalhos de grupo
  ws['!merges'] = [];
  // Linha 0 merges
  ws['!merges'].push({s:{r:0,c:0},e:{r:0,c:1}});                           // # + Nome
  ws['!merges'].push({s:{r:0,c:afStartC},e:{r:0,c:notaEndC}});              // 85%
  ws['!merges'].push({s:{r:0,c:atitStartC},e:{r:0,c:atitEndC}});            // 15%
  ws['!merges'].push({s:{r:0,c:cfStartC},e:{r:0,c:cfEndC}});                // Classif. Final
  // Linha 1 merges
  ws['!merges'].push({s:{r:1,c:0},e:{r:1,c:1}});
  if(isSem2){
    ws['!merges'].push({s:{r:1,c:afStartC},  e:{r:1,c:afStartC+3}});        // AF 1ºS

  } else {
    ws['!merges'].push({s:{r:1,c:afStartC},e:{r:1,c:afEndC}});              // AF

  ws['!merges'].push({s:{r:1,c:ativStartC},e:{r:1,c:ativEndC}});            // Atividades
  ws['!merges'].push({s:{r:1,c:resumoStartC},e:{r:1,c:resumoEndC}});        // Resumo
  if(isSem2){
    ws['!merges'].push({s:{r:1,c:conhecStartC},  e:{r:1,c:conhecStartC+1}});// Conh 1ºS
    // conhecStartC+2 e conhecStartC+3 individuais
  } else {
    ws['!merges'].push({s:{r:1,c:conhecStartC},e:{r:1,c:conhecEndC}});      // Conh
  }
  // Total (sem merge), notas (merge 2 cols)
  ws['!merges'].push({s:{r:1,c:totalStartC+1},e:{r:1,c:totalStartC+2}});    // Nota Prev + Prof
  if(isSem2){
    ws['!merges'].push({s:{r:1,c:atitStartC},  e:{r:1,c:atitStartC+3}});    // Atit 1ºS
    ws['!merges'].push({s:{r:1,c:atitStartC+4},e:{r:1,c:atitStartC+7}});    // Atit 2ºS
    // atitFinal individual
  } else {
    ws['!merges'].push({s:{r:1,c:atitStartC},e:{r:1,c:atitEndC}});          // Atit
  }
  ws['!merges'].push({s:{r:1,c:cfStartC},e:{r:1,c:cfEndC}});                // CF

  ws['!ref'] = XLSX.utils.encode_range(range);

  // Larguras de coluna
  ws['!cols'] = colDefs.map(c=>({wch:c.w}));

  // Altura das linhas de cabeçalho
  ws['!rows'] = [{hpt:30},{hpt:44},{hpt:44}];

  // Congelar 3 linhas de cabeçalho + 2 colunas (# e Nome)
  ws['!freeze'] = {xSplit:2, ySplit:3};

  const wb = XLSX.utils.book_new();
  const sheetName = `${semestre}º Sem - ${turma.nome}`.slice(0,31);
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  const fileName = `Avaliacao_${semestre}S_${turma.nome.replace(/[^a-zA-Z0-9]/g,'_')}_${S.anoLetivo.replace('/','_')}.xlsx`;
  XLSX.writeFile(wb, fileName);
}

// Calcula % de aulas realizadas (sem FP) por aluno, num semestre específico (1 ou 2)
function calcPercAulasRealizadas(turmaId, nomeAluno, semestre){
  let totalAulas=0, aulasPresente=0;
  Object.entries(S.sumarios).forEach(([sumKey, sum])=>{
    if(sum.turmaId!=turmaId || !sum.sumario) return;
    if(String(sum.semestre)!==String(semestre)) return;
    totalAulas++;
    const falta=S.faltas[sumKey]?.[nomeAluno];
    // Aluno presente = sem qualquer tipo de falta (fp, fa, fm, fd)
    if(!falta) aulasPresente++;
  });
  if(totalAulas===0) return '';
  return Math.round((aulasPresente/totalAulas)*100)+'%';
}

function getAulasDadas(turmaId){
  const r={s1:0,s2:0};
  Object.values(S.sumarios).forEach(v=>{if(v.turmaId===turmaId&&v.sumario){if(v.semestre==='1')r.s1++;else r.s2++;}});
  return r;
}

// Conta aulas dadas exactamente como a Planificação:
// soma por espaço+modalidade via campo modalidadeSumario dos sumários
function getAulasDadasPlanificacao(turmaId){
  const espacos=['E1 + E2','G1','G2'];
  const semanas=getSemanasLetivas();
  let s1=0, s2=0;
  const contados=new Set();
  Object.entries(S.sumarios).forEach(([sumKey,s])=>{
    if(!s.modalidadeSumario||!s.sumario||s.turmaId!=turmaId) return;
    if(contados.has(sumKey)) return;
    const parts=sumKey.split('_');
    if(parts.length<3) return;
    const dt=parts[0];
    const slot=parts[1]+'_'+parts[2];
    const aulaBase=S.horario[slot];
    if(!aulaBase||aulaBase.turmaId!=turmaId) return;
    const weekIdx=semanas.findIndex(sem=>sem.includes(dt));
    if(weekIdx<0) return;
    const espacoRot=getEspacoRotacionado(aulaBase.espaco, weekIdx);
    const grupoRot=(espacoRot==='E1'||espacoRot==='E2')?'E1 + E2':espacoRot;
    if(!espacos.includes(grupoRot)) return;
    contados.add(sumKey);
    const sem=parseInt(s.semestre)||1;
    if(sem===1) s1++; else s2++;
  });
  return {s1, s2};
}

function getAulasPrevistas(turmaId){
  let s1=0,s2=0;
  const semanas=getSemanasLetivas();
  Object.entries(S.horario).forEach(([slot,data])=>{
    if(data&&data.turmaId===turmaId){
      semanas.forEach(semana=>{
        const dt=getDateForSlot(semana,slot);
        if(dt&&!isFeriadoOrPausa(dt)){const sem=getSemestre(dt);if(sem===1)s1++;else if(sem===2)s2++;}
      });
    }
  });
  return{s1,s2};
}

// Aulas previstas por espaço (G1, G2, E1+E2) e semestre para uma turma
// Conta exactamente as células visíveis no plano semanal: semana a semana,
// com o espaço rotacionado (G1→E1→G2→E2→…), excluindo feriados/pausas.
function getAulasPrevistasEspaco(turmaId){
  const r={'G1':{s1:0,s2:0},'G2':{s1:0,s2:0},'E1+E2':{s1:0,s2:0}};
  const semanas=getSemanasLetivas();
  semanas.forEach((semana,idx)=>{
    Object.entries(S.horario).forEach(([slot,data])=>{
      if(!data||data.turmaId!==turmaId) return;
      const dt=getDateForSlot(semana,slot);
      if(!dt||isFeriadoOrPausa(dt)) return;
      const espacoRot=getEspacoRotacionado(data.espaco,idx);
      const grupo=espacoRot==='E1'||espacoRot==='E2'?'E1+E2':espacoRot;
      if(!r[grupo]) return;
      const sem=getSemestre(dt);
      if(sem===1) r[grupo].s1++; else if(sem===2) r[grupo].s2++;
    });
  });
  return r;
}

function getModalidadesCounts(turmaId){
  const c={};
  // Ler de modalidadesSemana (fonte principal após a refatoração)
  Object.entries(S.modalidadesSemana||{}).forEach(([weekKey,slots])=>{
    Object.entries(slots).forEach(([slot,mod])=>{
      if(!mod) return;
      const aula=S.horario[slot];
      if(!aula||aula.turmaId!=turmaId) return;
      // Só contar se existe sumário com conteúdo para esta aula nesta semana
      const semanas=getSemanasLetivas();
      const semana=semanas.find(s=>s[0]===weekKey);
      const dt=semana?getDateForSlot(semana,slot):null;
      const sumKey=dt?`${dt}_${slot}`:'';
      if(sumKey&&S.sumarios[sumKey]?.sumario) c[mod]=(c[mod]||0)+1;
    });
  });
  return c;
}

function getModalidadesCountsBySem(turmaId){
  // Devolve { mod: { s1: N, s2: N } } — fonte: campo modalidadeSumario do separador Sumários
  const c={};
  Object.values(S.sumarios).forEach(s=>{
    if(!s.sumario||!s.modalidadeSumario||s.turmaId!=turmaId) return;
    const sem=parseInt(s.semestre)||1;
    const mod=s.modalidadeSumario;
    if(!c[mod]) c[mod]={s1:0,s2:0};
    if(sem===1) c[mod].s1++; else c[mod].s2++;
  });
  return c;
}

function getAllModalidadesCounts(){
  // Conta todas as modalidades de todas as turmas para o painel global
  const c={};
  Object.entries(S.modalidadesSemana||{}).forEach(([weekKey,slots])=>{
    Object.entries(slots).forEach(([slot,mod])=>{
      if(!mod) return;
      const semanas=getSemanasLetivas();
      const semana=semanas.find(s=>s[0]===weekKey);
      const dt=semana?getDateForSlot(semana,slot):null;
      const sumKey=dt?`${dt}_${slot}`:'';
      if(sumKey&&S.sumarios[sumKey]?.sumario) c[mod]=(c[mod]||0)+1;
    });
  });
  return c;
}

            }).join('')}

// === PLANIFICAÇÃO ===
function renderPlanificacao(){
  const todasMods=[...MODALIDADES].sort((a,b)=>a.localeCompare(b,'pt'));
  const espacosData={
    'E1 + E2':todasMods,
    'G1':todasMods,
    'G2':todasMods
  };
  const allMods=[...new Set(Object.values(espacosData).flat())].sort();

  // Seletor de turma
  if(!filterPlanTurma && S.turmas.length) filterPlanTurma=S.turmas[0].id;
  const turma = S.turmas.find(t=>t.id==filterPlanTurma);
  const turmasOpts=`<option value="">Selecionar turma...</option>${S.turmas.map(t=>`<option value="${t.id}"${filterPlanTurma==t.id?' selected':''}>${esc(t.nome)}</option>`).join('')}`;

  if(!S.turmas.length){
    return `<div><div class="section-title">Planificação</div>
      <div class="empty-msg">📋 Crie pelo menos uma turma no Painel para configurar a planificação.</div></div>`;
  }
  if(!turma){
    return `<div><div class="section-title">Planificação</div>
      <div class="filter-bar"><select class="filter-select" id="filterPlanTurmaS">${turmasOpts}</select></div>
      <div class="empty-msg">Selecione uma turma.</div></div>`;
  }

  // Aulas previstas calculadas automaticamente (igual ao painel principal)
  const prev=getAulasPrevistas(turma.id);
  const p1=prev.s1, p2=prev.s2;

  if(!S.planificacao) S.planificacao={};
  if(!S.planificacao[turma.id]) S.planificacao[turma.id]={};
  const plan=S.planificacao[turma.id];

  // Contar aulas dadas por modalidade E espaço (via campo modalidadeSumario do separador Sumários)
  // O espaço é determinado pelo espaço rotacionado na semana em que o sumário foi registado
  function getCountsMod(modalidade, semestre, espaco){
    let n=0;
    const semanas=getSemanasLetivas();
    Object.entries(S.sumarios).forEach(([sumKey,s])=>{
      // Usar o novo campo modalidadeSumario; ignorar se não preenchido
      if(!s.modalidadeSumario||s.modalidadeSumario!==modalidade) return;
      if(!s.sumario||s.turmaId!=turma.id) return;
      if(semestre!=='all'&&s.semestre!=semestre) return;
      // Determinar o espaço desta aula a partir do sumKey (formato "YYYY-MM-DD_di_bi")
      const parts=sumKey.split('_');
      if(parts.length<3) return;
      const dt=parts[0];
      const slot=parts[1]+'_'+parts[2];
      const aulaBase=S.horario[slot];
      if(!aulaBase||aulaBase.turmaId!=turma.id) return;
      // Calcular o índice da semana para obter o espaço rotacionado
      const weekIdx=semanas.findIndex(sem=>sem.includes(dt));
      if(weekIdx<0) return;
      const espacoRot=getEspacoRotacionado(aulaBase.espaco, weekIdx);
      // Agrupar E1 e E2 no mesmo bloco "E1 + E2"
      const grupoRot=(espacoRot==='E1'||espacoRot==='E2')?'E1 + E2':espacoRot;
      if(grupoRot!==espaco) return;
      n++;
    });
    return n;
  }

  // Contar modalidades planeadas no Plano Semanal por modalidade E espaço
  function getPlanoSemanalMod(modalidade, semestre, espaco){
    let n=0;
    const semanas=getSemanasLetivas();
    Object.entries(S.modalidadesSemana||{}).forEach(([weekKey,slots])=>{
      const semanaIdx=semanas.findIndex(s=>s[0]===weekKey);
      if(semanaIdx<0) return;
      const semana=semanas[semanaIdx];
      Object.entries(slots).forEach(([slot,mod])=>{
        if(mod!==modalidade) return;
        const aula=S.horario[slot];
        if(!aula||aula.turmaId!=turma.id) return;
        const dt=getDateForSlot(semana,slot);
        if(!dt||isFeriadoOrPausa(dt)) return;
        const sem=getSemestre(dt);
        if(semestre!=='all'&&sem!==parseInt(semestre)) return;
        // Verificar o espaço rotacionado desta semana
        const espacoRot=getEspacoRotacionado(aula.espaco, semanaIdx);
        const grupoRot=(espacoRot==='E1'||espacoRot==='E2')?'E1 + E2':espacoRot;
        if(grupoRot!==espaco) return;
        n++;
      });
    });
    return n;
  }

  const rows=allMods.map(m=>{
    // Somar por espaço para evitar dupla contagem
    let d1=0,d2=0,ps1=0,ps2=0;
    Object.entries(espacosData).forEach(([esp,mods])=>{
      if(!mods.includes(m)) return;
      d1+=getCountsMod(m,'1',esp);
      d2+=getCountsMod(m,'2',esp);
      ps1+=getPlanoSemanalMod(m,'1',esp);
      ps2+=getPlanoSemanalMod(m,'2',esp);
    });
    const p1=Object.entries(espacosData).reduce((s,[esp,mods])=>{
      if(!mods.includes(m)) return s;
      return s+(parseInt(plan[`${esp}__${m}`]?.previsto1s)||0);
    },0);
    const p2=Object.entries(espacosData).reduce((s,[esp,mods])=>{
      if(!mods.includes(m)) return s;
      return s+(parseInt(plan[`${esp}__${m}`]?.previsto2s)||0);
    },0);
    return {m,d1,d2,dt:d1+d2,p1,p2,ps1,ps2};
  });

  // Totais globais = soma dos totais de cada espaço
  let t1=0,t2=0,totalP1global=0,totalP2global=0,totalPS1global=0,totalPS2global=0;
  Object.entries(espacosData).forEach(([espaco,mods])=>{
    mods.forEach(m=>{
      const planKey=`${espaco}__${m}`;
      totalP1global+=(parseInt(plan[planKey]?.previsto1s)||0);
      totalP2global+=(parseInt(plan[planKey]?.previsto2s)||0);
      totalPS1global+=getPlanoSemanalMod(m,'1',espaco);
      totalPS2global+=getPlanoSemanalMod(m,'2',espaco);
      t1+=getCountsMod(m,'1',espaco);
      t2+=getCountsMod(m,'2',espaco);
    });
  });

  // Estilos de cabeçalho de grupo reutilizáveis

  // Larguras fixas partilhadas por todos os quadros
  const colGroup=`<colgroup>
    <col style="width:180px">

  function inputCell(espaco,m,sem,val){
    return `<td style="padding:2px 3px;border:1px solid var(--border)"><input type="number" min="0" class="plan-input" data-espaco="${esc(espaco)}" data-mod="${esc(m)}" data-sem="${sem}" value="${val||''}" placeholder="0" style="width:100%;box-sizing:border-box;text-align:center;border:1px solid var(--border);border-radius:4px;padding:3px 2px;font-size:12px"></td>`;
  }

  return `<div style="display:flex;flex-direction:column;min-height:100%">

    <!-- ZONA FIXA (sticky) -->

      <div class="filter-bar">

      </div>

      <!-- QUADRO GLOBAL FIXO -->

          <tbody>

function renderGrelhaObsModal(){
  const turma=S.turmas.find(t=>t.id==modal.turmaId);
  if(!turma) return '';
  const sub=modal.sub;
  const col=modal.col;
  const key=`${turma.id}__${sub}`;
  if(!S.avaliacao[key]) S.avaliacao[key]={notas:{},obsAlunos:{},ativNotas:{},obs:''};
  const dados=S.avaliacao[key];
  const ativTitulosModal=getAtividadesTitulos(turma.id, sub);
  dados.atividadesTitulos=ativTitulosModal;
  const titulo=ativTitulosModal[col]||`Matéria ${col+1}`;
  if(normalizeTitulo(titulo)==='ATLETISMO') return renderGrelhaObsModalAtletismo(turma, sub, col, titulo, dados);
  const criterios=getCriteriosGrelha(turma.id, sub, col, titulo);
  if(!dados.grelhaObs) dados.grelhaObs={};
  if(!dados.grelhaObs[col]) dados.grelhaObs[col]={};
  const grelha=dados.grelhaObs[col];
  const semLabel=sub==='sem2'?'2º Semestre':'1º Semestre';

  const rows=turma.alunos.map((a,i)=>{
    const nome=typeof a==='string'?a:a.nome;
    const vals=grelha[nome]||['','','',''];
    const filled=vals.filter(v=>v!==''&&v!==null&&v!==undefined);
    const soma=vals.reduce((s,v)=>s+(parseFloat(v)||0),0);

// Provas em que valores MENORES são melhores (tempo): velocidade, km. Nas restantes (distância), valores MAIORES são melhores.
const PROVAS_ATLETISMO_TEMPO=['velocidade','km'];
// Converte um resultado textual (resultado do aluno) num número, aceitando vírgula ou ponto como decimal
// e formato minutos:segundos (m:ss ou mm:ss) para a prova "km".
function parseResultadoAtletismo(valor, prova){
  if(valor==null) return null;
  let v=String(valor).trim();
  if(!v) return null;
  if(prova==='km' && v.includes(':')){
    const [m,s]=v.split(':');
    const mm=parseFloat(m), ss=parseFloat((s||'0').replace(',','.'));
    if(isNaN(mm)||isNaN(ss)) return null;
    return mm+ss/60; // minutos com fração
  }
  v=v.replace(',','.');
  const n=parseFloat(v);
  return isNaN(n)?null:n;
}
// Calcula o nível (I/S/B/MB) de um resultado, dado a prova, género e escalão, usando REF_ATLETISMO.
// Retorna '' se não houver dados suficientes (género/escalão/resultado em falta ou inválido).
function calcAvaliacaoAtletismo(prova, genero, escalao, resultadoStr){
  const generoKey=genero==='M'?'masculino':(genero==='F'?'feminino':'');
  if(!generoKey||!escalao) return '';
  const refGenero=REF_ATLETISMO[generoKey];
  if(!refGenero||!refGenero[prova]) return '';
  const escalaoMap={'Infantil A':'Infantis A','Infantil B':'Infantis B','Iniciado':'Iniciados','Juvenil':'Juvenis','Júnior':'Juniores'};
  const escalaoRef=escalaoMap[escalao]||escalao;
  const limites=refGenero[prova].valores[escalaoRef];
  if(!limites) return '';
  const n=parseResultadoAtletismo(resultadoStr, prova);
  if(n===null) return '';
  // limites: [I, S, B, MB] cada um como string '>x'/'<x' representando o limiar daquele nível.
  // Na prova "km" o número é notação minutos.segundos (ex: 3.15 = 3min15s), não decimal.
  const lims=limites.map(l=>{
    const s=String(l).replace(/[<>]/g,'').replace('m','');
    if(prova==='km'){
      const [m,sec]=s.split(/[.,]/);
      if(sec===undefined) return parseFloat(s);
      return parseFloat(m)+parseFloat(sec)/60;
    }
    return parseFloat(s.replace(',','.'));
  });
  const tempoProva=PROVAS_ATLETISMO_TEMPO.includes(prova);
  if(tempoProva){
    // menor é melhor: lims=[limI, limS, limB, limMB] decrescentes.
    // Cada banda usa o limiar do nível seguinte (mais alto) como teto.
    if(n<=lims[3]) return 'MB';
    if(n<=lims[1]) return 'B';
    if(n<=lims[0]) return 'S';
    return 'I';
  } else {
    // maior é melhor: lims=[limI, limS, limB, limMB] crescentes; cada nível é o seu próprio piso.
    if(n>=lims[3]) return 'MB';
    if(n>=lims[2]) return 'B';
    if(n>=lims[1]) return 'S';
    return 'I';
  }
}

// === HELPERS ===
function esc(s){if(s==null)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escJ(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"');}
function fmtDate(dt){if(!dt)return '';const[y,m,d]=dt.split('-');return`${d}/${m}/${y}`;}

// Calcula o espaço rotacionado para uma dada semana
// A sequência é: G1 → E1 → G2 → E2 → G1 → ...
// O espaço base (definido no horário) corresponde à semana 0 (1ª semana letiva)
function getEspacoRotacionado(espacoBase, weekIndex){
  if(!espacoBase||!ESPACOS.includes(espacoBase)) return espacoBase;
  const baseIdx=ESPACOS.indexOf(espacoBase);
  return ESPACOS[(baseIdx+weekIndex)%ESPACOS.length];
}

function getSemanasLetivas(){
  const cal=S.calendario;
  if(!cal||!cal.inicio||!cal.fim1s) return [];
  const monday=new Date(cal.inicio);
  const day=monday.getDay();
  monday.setDate(monday.getDate()+(day===0?-6:1-day));
  const ends=[cal.fim1s,...Object.values(cal.fimAnos||{})].filter(Boolean);
  const endDate=ends.reduce((a,b)=>a>b?a:b,ends[0]);
  if(!endDate) return [];
  const semanas=[];
  let cur=new Date(monday);
  while(cur.toISOString().slice(0,10)<=endDate){
    const week=[];
    for(let i=0;i<5;i++){const d=new Date(cur);d.setDate(cur.getDate()+i);week.push(d.toISOString().slice(0,10));}
    semanas.push(week);
    cur.setDate(cur.getDate()+7);
  }
  return semanas;
}

function getDateForSlot(semana,slot){return semana[parseInt(slot.split('_')[0])]||null;}
function isFeriadoOrPausa(dt){
  if(S.feriados.includes(dt)) return true;
  if(S.pausas.includes(dt)) return true;
  if(S.pausasIntervalos&&S.pausasIntervalos.some(p=>dt>=p.inicio&&dt<=p.fim)) return true;
  return false;
}
function getNumPeriodos(){ return (S && S.config && S.config.modoPeriodos === 'periodos') ? 3 : 2; }
function getLabelPeriodo(n){ return getNumPeriodos()===3 ? n+'º Período' : n+'º Semestre'; }

function getSemestre(dt){
  const cal=S.calendario;
  if(!cal||!cal.inicio) return 1;
  if(getNumPeriodos()===3){
    const f1=cal.fim1p||cal.fim1s||'';
    const f2=cal.fim2p||'';
    if(!f1) return 1;
    if(dt<=f1) return 1;
    if(!f2||dt<=f2) return 2;
    return 3;
  }
  if(!cal.fim1s) return 1;
  return dt<=cal.fim1s?1:2;
}

  // Avaliação FITESCOLA em tempo real — lê género e idade directamente da linha da tabela
  document.querySelectorAll('.fite-input').forEach(el=>{
    // Navegação Enter → célula de baixo (mesmo teste, aluno seguinte)
    el.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const testeId=el.dataset.teste;
        const allInputs=[...document.querySelectorAll('.fite-input[data-teste="'+testeId+'"]')];
        const idx=allInputs.indexOf(el);
        if(idx>=0 && idx<allInputs.length-1) allInputs[idx+1].focus();
      }
    });
    el.addEventListener('input',()=>{
      const testeId=el.dataset.teste;
      const val=el.value.trim();
      // Ler género e idade dos data attributes da linha
      const row=el.closest('tr');
      if(!row) return;
      const gen=(row.dataset.gen||'').toUpperCase();
      const idadeRaw=parseInt(row.dataset.idade||'');
      const idadeClamp=isNaN(idadeRaw)?null:Math.max(9,Math.min(18,idadeRaw));
      const ref=(gen==='M'||gen==='F')?(FITESCOLA_TB[gen]?.[idadeClamp]||FITESCOLA_TB[gen]?.[15]||null):null;
      const teste=FITESCOLA_TESTES.find(t=>t.id===testeId);
      console.log('FITE DEBUG: gen=',gen,'idade=',idadeClamp,'testeId=',testeId,'val=',val,'ref=',ref?.[testeId],'higher=',teste?.higher,'isMilha=',testeId==='milha');
      if(!ref||!teste) return;
      const ev=fitEval(val, ref[testeId], teste.higher, testeId==='milha');
      const evalCell=el.closest('td')?.nextElementSibling;
      if(evalCell){
        evalCell.textContent=ev.label;
        evalCell.style.color=ev.color;
      }
      // Actualizar resumo — estão nas posições 4,5,6 da linha (após #,Nome,Gén,Id)
      const allEvals=[...row.querySelectorAll('.fite-eval')];
      let nPM=0,nOK=0,nAtl=0;
      allEvals.forEach(cell=>{
        const t=cell.textContent.trim();
        if(t==='PM') nPM++;
        else if(t==='OK') nOK++;
        else if(t.includes('Atlético')) nAtl++;
      });
      const resumoCells=[...row.querySelectorAll('.fite-resumo')];
      if(resumoCells[0]) resumoCells[0].textContent=nPM||'';
      if(resumoCells[1]) resumoCells[1].textContent=nOK||'';
      if(resumoCells[2]) resumoCells[2].textContent=nAtl||'';
      collectAndSaveAval();
    });
  });

  // AID — recalcular Class. Final Atitudes e Nota Estimada em tempo real
  function aidRecalcRow(row){
    if(!row) return;
    const ano=row.dataset.ano||'10º';
    const AID_MAP_BY_ANO={
      '7º': {'Muito Bom':6,  'Bom':4,   'Suficiente':2.5, 'Insuficiente':1.5},
      '8º': {'Muito Bom':7,  'Bom':5,   'Suficiente':3.5, 'Insuficiente':2.5},
      '9º': {'Muito Bom':8.5,'Bom':6.5, 'Suficiente':4.5, 'Insuficiente':2.5},
      '10º':{'Muito Bom':9.5,'Bom':7.5, 'Suficiente':5,   'Insuficiente':2.5},
      '11º':{'Muito Bom':9.5,'Bom':7.5, 'Suficiente':5,   'Insuficiente':2.5},
      '12º':{'Muito Bom':10, 'Bom':8,   'Suficiente':5.5, 'Insuficiente':3},
    };
    const AID_MAP=AID_MAP_BY_ANO[ano]||AID_MAP_BY_ANO['10º'];
    // Aptidão física pontos — lê do input editável (override) ou, se vazio, do data-auto
    const pontosFitInput=row.querySelector('.fit-pontos-override');
    const pf=pontosFitInput
      ? (pontosFitInput.value.trim()!=='' ? parseFloat(pontosFitInput.value) : parseFloat(pontosFitInput.dataset.auto)||0)
      : (parseFloat(row.querySelector('td:nth-child(8)')?.textContent)||0);
    // Atividades físicas e conhecimentos
    const acVal=row.querySelector('.aid-ativ-conh')?.value||'';
    const ac=acVal!==''?(AID_MAP[acVal]??0):0;
    const pontosCell=row.querySelector('.aid-ativ-conh-pontos');
    if(pontosCell) pontosCell.textContent=acVal?ac:'';
    // Total pontos e class. final domínio
    const aidTotal=acVal!==''?Math.round((pf+ac)*100)/100:'';
    const totalCell=row.querySelector('.aid-total-pontos');
    if(totalCell) totalCell.textContent=aidTotal;
    const classFinal=aidTotal!==''?calcClassFinal(aidTotal,ano,'sem1'):'';
    const classFinalCell=row.querySelector('.aid-class-final');
    if(classFinalCell) classFinalCell.textContent=classFinal;
    // Atitudes
    const r=parseFloat(row.querySelector('.aid-responsab')?.value)||0;
    const e=parseFloat(row.querySelector('.aid-exigencia')?.value)||0;
    const atit=(r||e)?Math.round((r+e)*10)/10:'';
    const atitCell=row.querySelector('.aid-atit-final');
    if(atitCell) atitCell.textContent=atit;
    // Actualizar Nota do Professor automática (secundário: igual à Class. Final)
    const notaProfAuto=row.querySelector('.aid-nota-professor-auto');
    if(notaProfAuto) notaProfAuto.textContent=classFinal;
    // Nota estimada = Nota do Professor * 85% + Class. Final Atitudes * 15%
    const notaProfInput=row.querySelector('.aid-nota-professor');
    const notaProf=notaProfInput ? parseFloat(notaProfInput.value) : parseFloat(notaProfAuto?.textContent);
    const af=parseFloat(atit)||0;
    const notaEst=(!isNaN(notaProf)&&af)?Math.round((notaProf*0.85+af*0.15)*10)/10:'';
    const mediaCell=row.querySelector('.aid-media');
    if(mediaCell) mediaCell.textContent=notaEst;
  }

  function updateResumoRow(row){
    if(!row) return;
    const ano=row.dataset.ano||'';
    const isSem2Row=filterAvaliacaoSub==='sem2';
    const nMelhores=isSem2Row?(ano==='7º'?5:6):(ano==='7º'?2:3);
    const inputs=[...row.querySelectorAll('.ativ-nota')];
    const rawVals=inputs.map(el=>parseFloat(el.value)||0);
    const vCols1a4r=rawVals.slice(0,4).filter(v=>v>0).sort((a,b)=>b-a);
    const vCol5Ginr=rawVals[4]||0;
    const vCol6Dancar=rawVals[5]||0;
    const vCols6a14r=rawVals.slice(5,14).filter(v=>v>0).sort((a,b)=>b-a);
    let m1=0,m2=0,m3=0,m4=0,m5=0,m6=0;
    if(isSem2Row){
      if(ano==='7º'){
        m1=vCols1a4r[0]||0; m2=vCol5Ginr; m3=vCols6a14r[0]||0; m4=vCols6a14r[1]||0; m5=vCols6a14r[2]||0;
      } else if(ano==='8º'){
        m1=vCols1a4r[0]||0; m2=vCol5Ginr; m3=vCols6a14r[0]||0; m4=vCols6a14r[1]||0; m5=vCols6a14r[2]||0; m6=vCols6a14r[3]||0;
      } else if(ano==='9º'){
        m1=vCols1a4r[0]||0; m2=vCols1a4r[1]||0; m3=vCol5Ginr; m4=vCol6Dancar; m5=vCols6a14r[0]||0; m6=vCols6a14r[1]||0;
      } else {
        m1=vCols1a4r[0]||0; m2=vCols1a4r[1]||0; m3=vCol5Ginr; m4=vCol6Dancar; m5=vCols6a14r[0]||0; m6=vCols6a14r[1]||0;
      }
    } else {
      const vals=rawVals.filter(v=>v>0).sort((a,b)=>b-a);
      m1=vals[0]||0; m2=vals[1]||0; m3=nMelhores>=3?(vals[2]||0):0;
    }
    const total=Math.round((m1+m2+m3+m4+m5+m6)*10)/10;
    const maxPtsAtiv2s={'7º':8,'8º':9.5,'9º':10.5,'10º':13.5,'11º':14,'12º':14.5};
    const maxPtsAtiv=isSem2Row?(maxPtsAtiv2s[ano]||13.5):({'7º':4.5,'8º':5.5,'9º':7,'10º':8,'11º':8,'12º':8.5}[ano]||8);
    const pontos=Math.min(maxPtsAtiv,total);
    const resumos=[...row.querySelectorAll('.resumo-cell')];
    if(resumos[0]) resumos[0].textContent=m1||'';
    if(resumos[1]) resumos[1].textContent=m2||'';
    if(resumos[2]) resumos[2].textContent=isSem2Row?(m3||''):(nMelhores>=3?(m3||''):'N/A');
    if(isSem2Row){
      if(resumos[3]) resumos[3].textContent=m4||'';
      if(resumos[4]) resumos[4].textContent=m5||'';
      if(resumos[5]) resumos[5].textContent=m6||'';
      if(resumos[6]) resumos[6].textContent=total||'';
      if(resumos[7]) resumos[7].textContent=pontos||'';
    } else {
      if(resumos[3]) resumos[3].textContent=total||'';
      if(resumos[4]) resumos[4].textContent=pontos||'';
    }
    // Actualizar total geral
    const totalCell=row.querySelector('.total-pontos-cell');
    if(totalCell){
      const ptsConh=parseFloat(row.querySelector('.conh-pontos')?.textContent)||0;
      // No sem2: usar a célula Média de Pontos dos 2 semestres; no sem1: ler do input fit-pontos-override
      const fitInput=isSem2Row?null:row.querySelector('.fit-pontos-override');
      const pontosFit=isSem2Row
        ? (parseFloat(row.querySelector('.media-pontos-fit-cell')?.textContent)||0)
        : (parseFloat(fitInput?.value||fitInput?.dataset.auto)||0);
      const t=pontos+pontosFit+ptsConh;
      const tDisp=(pontos||pontosFit||ptsConh)?Math.round(t*100)/100:'';
      totalCell.textContent=tDisp;
      const cfVal=tDisp!==''?calcClassFinal(t,row.dataset.ano||'',filterAvaliacaoSub):'';
      const notaPrevistaCell=row.querySelector('.nota-prevista-cell');
      if(notaPrevistaCell) notaPrevistaCell.textContent=cfVal;
      const notaProfAuto=row.querySelector('.nota-professor-auto');
      if(notaProfAuto) notaProfAuto.textContent=cfVal;
      // Actualizar Média
      updateMediaRow(row);
    }
  }

  // === Navegar para a célula de baixo ao pressionar Enter em qualquer input/select editável ===
  function avalEnterNavigation(){
    const AVAL_INPUTS = [
      // Avaliação — tabela principal
      '.ativ-nota', '.ativ-titulo',
      '.nota-professor', '.nota-professor-auto',
      '.auto-avaliacao', '.classif-final-sem',
      '.conh-classif', '.conh-classif2s',
      '.atit-responsab', '.atit-responsab2s',
      '.atit-exigencia', '.atit-exigencia2s',
      // Avaliação — painel AID (10º/11º/12º)
      '.aid-nota-professor', '.aid-nota-professor-auto',
      '.aid-responsab', '.aid-exigencia',
      // Fitescola
      '.fit-pontos-override', '.fit-pontos2s-override',
      '.fite-input',
      // Avaliação Mista (SEM1AM)
      '.am-campo', '.am-auto-aval', '.am-questao', '.am-classif-final',
      '.am-meta', '.am-nota-tarefas', '.am-nota-trab',
      // Planificação
      '.plan-input',
      // Rotação
      '.rot-cell',
      // Sumários / Reuniões (textarea — desce para o próximo sumário)
      '.sumario-textarea', '.reuniao-notas',
    ].join(',');

    document.querySelectorAll(AVAL_INPUTS).forEach(el=>{
      el.addEventListener('keydown', e=>{
        if(e.key !== 'Enter') return;
        // Textareas: Enter normal dentro do texto; só navega com Ctrl+Enter ou Shift+Enter
        if(el.tagName === 'TEXTAREA'){
          if(!e.ctrlKey && !e.shiftKey) return;
        }
        e.preventDefault();
        const td = el.closest('td,th');
        const tr = el.closest('tr');
        const table = el.closest('table');
        if(!td || !tr || !table) return;
        const colIdx = [...tr.parentElement.children].indexOf(tr) >= 0
          ? [...tr.children].indexOf(td)
          : [...tr.children].indexOf(td);
        // Percorrer as linhas seguintes à procura de um input na mesma coluna
        let nextRow = tr.nextElementSibling;
        while(nextRow){
          const targetTd = nextRow.children[colIdx];
          if(targetTd){
            const inp = targetTd.querySelector(AVAL_INPUTS);
            if(inp && !inp.disabled && !inp.readOnly){
              inp.focus();
              if(inp.tagName !== 'TEXTAREA' && typeof inp.select === 'function') inp.select();
              return;
            }
          }
          nextRow = nextRow.nextElementSibling;
        }
      });
    });
  }
  avalEnterNavigation();

  // === SEM1AM — Recálculo em tempo real ===
  function amRecalcRow(row){
    if(!row) return;
    const CVAL={MB:5,B:4,S:3,IN:2,F:1};
    const CCOL={MB:'#1d4ed8',B:'#16a34a',S:'#d97706',IN:'#dc2626',F:'#7f1d1d'};
    const CBG={MB:'#dbeafe',B:'#dcfce7',S:'#fef9c3',IN:'#fee2e2',F:'#fecaca'};
    // Tabelas de conversão qualitativa → valor numérico por grupo de anos
    const TVAL_SEC={MB:20,B:17,S:13,IN:9,F:5};
    const TVAL_BAS={MB:100,B:89,S:69,IN:49,F:29};
    function toN(v){ return CVAL[v]??null; }
    function toLabel(v){
      if(v===''||v===null||isNaN(v)) return '';
      const n=parseFloat(v);
      if(n>=4.5) return 'MB'; if(n>=3.5) return 'B'; if(n>=2.5) return 'S'; if(n>=1.5) return 'IN'; return 'F';
    }
    // Valor numérico do quadro para uma classificação, consoante o ano
    function toValNota(classif, basico){ return classif?(basico?TVAL_BAS[classif]:TVAL_SEC[classif])??null:null; }
    // Média dos valores numéricos do quadro para uma lista de classificações
    function avgValNota(classifs, basico){
      const vals=classifs.map(v=>toValNota(v,basico)).filter(v=>v!==null);
      return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length*10)/10:'';
    }

    function getVal(cls){ const el=row.querySelector(cls); return el?(el.tagName==='SELECT'?el.value:el.value.trim()):''; }
    function avgClassif(...vals){ const ns=vals.map(v=>toN(v)).filter(v=>v!==null); return ns.length?Math.round(ns.reduce((a,b)=>a+b,0)/ns.length*100)/100:''; }

    const ano=row.dataset.ano||'';
    const basico=['7º','8º','9º'].includes(ano);

    const tarefasClassifs=[getVal('[data-campo="cumpre"]'),getVal('[data-campo="regras"]'),getVal('[data-campo="tecnico"]'),getVal('[data-campo="comunic"]')];
    const trabClassifs=[getVal('[data-campo="conhec"]'),getVal('[data-campo="compreensao"]'),getVal('[data-campo="cumpTema"]'),getVal('[data-campo="reflexao"]'),getVal('[data-campo="partes"]'),getVal('[data-campo="sequencia"]'),getVal('[data-campo="qualEscrita"]'),getVal('[data-campo="grafismo"]'),getVal('[data-campo="fontes"]'),getVal('[data-campo="prazo"]'),getVal('[data-campo="grafApres"]'),getVal('[data-campo="qualOral"]'),getVal('[data-campo="compreensaoTema"]')];

    // Valores numéricos do quadro (para exibição e cálculos — escala real)
    const notaTarefasVal=avgValNota(tarefasClassifs, basico);
    const notaTrabVal=avgValNota(trabClassifs, basico);
    // Labels qualitativas das notas (para cor das células Nota)
    const notaTarefas=avgClassif(...tarefasClassifs);
    const notaTrab=avgClassif(...trabClassifs);
    const questaoRaw=getVal('[data-campo="questaoAula"]');
    const questaoVal=questaoRaw!==''?parseFloat(questaoRaw):null;

    // Class. Final Conhecimentos: notaTarefasVal*0,5 + notaTrabVal*0,3 + questao*0,2
    const nt=notaTarefasVal!==''?parseFloat(notaTarefasVal):null;
    const ntb=notaTrabVal!==''?parseFloat(notaTrabVal):null;
    const nq=questaoVal;
    const classConhec=(nt!==null||ntb!==null||nq!==null)?Math.round(((nt||0)*0.5+(ntb||0)*0.3+(nq||0)*0.2)*100)/100:'';

    // Atitudes: soma dos selects (máx 16) → escala real
    const resp=getVal('[data-campo="responsab"]'); const exig=getVal('[data-campo="exigencia"]');
    const r=resp!==''?parseFloat(resp):null; const e=exig!==''?parseFloat(exig):null;
    const soma=(r!==null||e!==null)?Math.round(((r||0)+(e||0))*10)/10:'';
    const classAtit=soma!==''?Math.round(soma/20*(basico?100:20)*100)/100:'';

    const media=(classConhec!==''&&classAtit!=='')?Math.round((parseFloat(classConhec)*0.85+parseFloat(classAtit)*0.15)*100)/100:'';

    // Labels para cor das células (a partir da escala real)
    function labelReal(v){
      if(v===''||v===null||isNaN(v)) return '';
      const n=parseFloat(v);
      if(basico){ if(n>=90) return 'MB'; if(n>=70) return 'B'; if(n>=50) return 'S'; if(n>=30) return 'IN'; return 'F'; }
      else { if(n>=17) return 'MB'; if(n>=13) return 'B'; if(n>=9) return 'S'; if(n>=5) return 'IN'; return 'F'; }
    }
    const ntLabel=toLabel(notaTarefas), ntbLabel=toLabel(notaTrab);
    const ccLabel=labelReal(classConhec), caLabel=labelReal(classAtit), mLabel=labelReal(media);

    function setCell(cls, label){
      const c=row.querySelector(cls); if(!c) return;
      c.textContent=label||'';
      c.style.color=label?CCOL[label]:'#94a3b8';
      c.style.background=label?CBG[label]:'';
    }
    function setCellWhite(cls, label){
      const c=row.querySelector(cls); if(!c) return;
      c.textContent=label||'';
      c.style.background=label?CCOL[label]:'#64748b';
    }
    // Células Nota: mostrar valor numérico do quadro, com cor da classificação correspondente
    function setCellNota(cls, val, label){
      const c=row.querySelector(cls); if(!c) return;
      c.textContent=val!==''?val:'';
      c.style.color=label?CCOL[label]:'#94a3b8';
      c.style.background=label?CBG[label]:'';
    }
    setCellNota('.am-nota-tarefas', notaTarefasVal, ntLabel);
    setCellNota('.am-nota-trab', notaTrabVal, ntbLabel);
    // Mostrar valor numérico real nas células Class. Final, Class. Atit e Média
    function setCellRealVal(cls, val, label){
      const c=row.querySelector(cls); if(!c) return;
      c.textContent=val!==''&&val!==null?val:'';
      c.style.background=label?CCOL[label]:'#64748b';
    }
    setCellRealVal('.am-class-conhec', classConhec, ccLabel);
    setCellRealVal('.am-class-atit', classAtit, caLabel);
    setCellRealVal('.am-media', media, mLabel);

  }

  // === EXPORTAR PDF — função partilhada (jsPDF autoTable) ===
  async function exportTabelaPdf(btn, fileName, turmaLabel){
    const originalHtml=btn.innerHTML;
    btn.innerHTML='⏳ A gerar...';
    btn.disabled=true;
    try {
      // Carregar jsPDF-autoTable dinamicamente se ainda não estiver presente
      if(!window.jspdf?.jsPDF?.API?.autoTable && !document._autotableLoaded){
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js';
          s.onload=()=>{ document._autotableLoaded=true; res(); };
          s.onerror=rej;
          document.head.appendChild(s);
        });
        await new Promise(r=>setTimeout(r,100));
      }

      const wrapper=document.getElementById('aval-table-wrapper');
      if(!wrapper){ alert('Não foi possível encontrar a tabela.'); return; }
      const table=wrapper.querySelector('table');
      if(!table){ alert('Tabela não encontrada.'); return; }

      const { jsPDF }=window.jspdf;
      const pdf=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});

      // Altura do cabeçalho reservada no topo de cada página
      const HEADER_H = 18;

      // Função que desenha o cabeçalho em cada página
      function drawPageHeader(){
        const pageW = pdf.internal.pageSize.getWidth();
        // Fundo azul-escuro
        pdf.setFillColor(26, 45, 74);
        pdf.rect(0, 0, pageW, HEADER_H, 'F');

        // Título à esquerda
        pdf.setFontSize(10);
        pdf.setTextColor(255, 255, 255);
        pdf.setFont(undefined, 'bold');
        pdf.text('DOSSIER DE EDUCAÇÃO FÍSICA', 5, 7);

        // Escola (linha 2 esquerda)
        pdf.setFontSize(6.5);
        pdf.setFont(undefined, 'normal');
        pdf.setTextColor(180, 210, 255);
        pdf.text(S.escola || '', 5, 12.5);

        // Professor (centro)
        if(S.professor){
          pdf.setFontSize(8);
          pdf.setFont(undefined, 'bold');
          pdf.setTextColor(255, 255, 255);
          const profText = S.professor;
          pdf.text(profText, pageW / 2, 7, { align: 'center' });
        }

        // Ano letivo e turma (direita)
        pdf.setFontSize(7.5);
        pdf.setFont(undefined, 'bold');
        pdf.setTextColor(255, 255, 255);
        pdf.text('Ano letivo: ' + (S.anoLetivo || ''), pageW - 5, 7, { align: 'right' });
        if(turmaLabel){
          pdf.setFontSize(8.5);
          pdf.setTextColor(147, 197, 253);
          pdf.text('Turma: ' + turmaLabel, pageW - 5, 13, { align: 'right' });
        }

        // Linha separadora
        pdf.setDrawColor(96, 165, 250);
        pdf.setLineWidth(0.4);
        pdf.line(0, HEADER_H, pageW, HEADER_H);
      }

      // Extrair cabeçalhos e células directamente do DOM
      // Usar o plugin autoTable com o elemento HTML directamente
      pdf.autoTable({
        html: table,
        startY: HEADER_H + 3,
        margin: {left:4, right:4, top: HEADER_H + 3, bottom:8},
        theme: 'grid',
        tableWidth: 'wrap',
        styles:{
          fontSize:5,
          cellPadding:1.2,
          overflow:'linebreak',
          halign:'center',
          valign:'middle',
          lineColor:[200,200,200],
          lineWidth:0.1,
          minCellWidth:4,
        },
        headStyles:{
          fillColor:[26,45,74],
          textColor:255,
          fontStyle:'bold',
          fontSize:4.5,
          cellPadding:1,
          halign:'center',
          valign:'middle',
        },
        columnStyles:{
          0:{cellWidth:10}, // Semestre
          1:{cellWidth:22, halign:'left'}, // Aluno
          2:{cellWidth:7},  // Ano
          3:{cellWidth:9},  // Turma
          4:{cellWidth:6},  // Nº
        },
        didParseCell(data){
          // Preservar cores de fundo das células coloridas
          const cell=data.cell.raw;
          if(!cell || typeof cell.style === 'undefined') return;
          const bg=cell.style.background||cell.style.backgroundColor||'';
          if(bg && bg!=='transparent' && bg!==''){
            const rgb=bg.replace(/[^\d,]/g,'').split(',').map(Number);
            if(rgb.length>=3 && !(rgb[0]===255&&rgb[1]===255&&rgb[2]===255)){
              data.cell.styles.fillColor=rgb.slice(0,3);
              // Texto branco em fundos escuros
              const lum=0.299*rgb[0]+0.587*rgb[1]+0.114*rgb[2];
              data.cell.styles.textColor=lum<160?[255,255,255]:[0,0,0];
            }
          }
          // Inputs e selects: extrair o valor
          const inp=cell.querySelector?.('input,select');
          if(inp){
            data.cell.text=[inp.value||''];
          }
        },
        didDrawPage(data){
          // Cabeçalho em todas as páginas

      target.scrollTop=0;

      const canvas=await html2canvas(target,{
        scale:2,
        useCORS:true,
        allowTaint:true,
        backgroundColor:'#f0f2f5',
        scrollX:0,
        scrollY:0,
        windowWidth:target.scrollWidth,
        windowHeight:target.scrollHeight,
        width:target.scrollWidth,
        height:target.scrollHeight
      });

      const { jsPDF }=window.jspdf;
      // A4 landscape em mm: 297 x 210
      const pageW=297, pageH=210;
      const margin=6; // mm
      const availW=pageW-margin*2;
      const availH=pageH-margin*2;

      const imgW=canvas.width;
      const imgH=canvas.height;

      // Escala para caber na largura disponível
      const scale=availW/(imgW/2*0.264583); // px → mm (96dpi: 1px=0.264583mm; scale=2 logo /2)
      const pxToMm=0.264583/2*scale; // factor final px→mm

      const totalHmm=imgH*pxToMm;
      const pageContentH=availH; // mm disponível por página

      const pdf=new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });

      let yOffset=0; // mm já colocados
      let page=0;

      while(yOffset<totalHmm){
        if(page>0) pdf.addPage();

        // Recortar a fatia desta página em px
        const sliceStartPx=Math.round(yOffset/pxToMm);
        const sliceHeightPx=Math.min(Math.round(pageContentH/pxToMm), imgH-sliceStartPx);
        if(sliceHeightPx<=0) break;

        const sliceCanvas=document.createElement('canvas');
        sliceCanvas.width=imgW;
        sliceCanvas.height=sliceHeightPx;
        const ctx=sliceCanvas.getContext('2d');
        ctx.drawImage(canvas, 0, sliceStartPx, imgW, sliceHeightPx, 0, 0, imgW, sliceHeightPx);

        const sliceDataUrl=sliceCanvas.toDataURL('image/jpeg',0.95);
        const sliceHmm=sliceHeightPx*pxToMm;

        pdf.addImage(sliceDataUrl,'JPEG', margin, margin, availW, sliceHmm);

        yOffset+=pageContentH;
        page++;
      }

      const fileName=`dossier_ef_${new Date().toISOString().slice(0,10)}.pdf`;
      pdf.save(fileName);

  const importPdfBtn=document.getElementById('importPdfBtn');
  if(importPdfBtn) importPdfBtn.addEventListener('change',async(e)=>{

    const status=document.getElementById('importStatus');
    status.style.color='var(--gray)';
    status.textContent='⏳ A ler o PDF...';
    try{
      if(!window.pdfjsLib){
        await new Promise((res,rej)=>{
          const s=document.createElement('script');
          s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';

      }
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;

      // Recolher todos os items com posição X,Y de todas as páginas
      let allItems=[];
      for(let p=1;p<=pdf.numPages;p++){
        const page=await pdf.getPage(p);

        content.items.forEach(item=>{
          const txt=item.str.trim();

      const YTOL=3;
      const linhasMap={};

        const yKey=Object.keys(linhasMap).find(k=>Math.abs(parseFloat(k)-item.y)<YTOL);

      // Ordenar linhas de cima para baixo (Y decrescente em PDF) e items da esquerda para a direita

        if(!nomeCompleto||nomeCompleto.length<2) return;
        // Guardar apenas primeiro nome + último apelido
        const partes=nomeCompleto.split(' ').filter(Boolean);
        const nome=partes.length>=2?`${partes[0]} ${partes[partes.length-1]}`:partes[0];

        const m=cols[dataIdx].match(reData);

        }

      status.textContent=`✅ ${importados.length} alunos lidos: ${novos} novos adicionados, ${atualizados} atualizados.`;
